LESSONS.push({
id:"b7", track:"cc", num:7, minutes:50,
title:{zh:"Subagents 分身术：一个任务拆给一队 AI", en:"Subagents: Split One Job Across a Team of AIs"},
objectives:{
 zh:["理解 Subagent 解决的两大问题：上下文污染与专业分工","会创建自定义 subagent（角色+工具+独立上下文）","理解并行执行的威力和边界","看懂「Agent Swarms」营销词背后的真实技术"],
 en:["Understand the two problems subagents solve: context pollution and specialization","Create custom subagents (role + tools + isolated context)","Grasp the power and limits of parallel execution","See the real tech behind the 'Agent Swarms' marketing term"]
},
body:{zh:`
<h3>7.1 为什么需要分身？</h3>
<p>单个 AI 会话有两个天然瓶颈：</p>
<ul>
<li><b>上下文污染</b>：让它先查资料再写代码，查资料读进来的 50 个文件塞满记忆，写代码时反而「脑子乱了」</li>
<li><b>角色冲突</b>：写代码的和审代码的是同一个「人」，它审自己的代码天然手软——它还记得自己为什么这么写，很难跳出来质疑</li>
</ul>
<p><span class="term">Subagent（子智能体）</span>解法：主 AI 是项目经理，把子任务派给<b>各自拥有干净独立上下文</b>的分身。分身做完只汇报结论，过程垃圾不进主会话。</p>
<pre>你 ──▶ 主 Claude（项目经理，掌握全局）
          ├─▶ 分身A：代码审查员（只看 diff，独立上下文）
          ├─▶ 分身B：测试工程师（只跑测试，独立上下文）
          └─▶ 分身C：文档检查员（只查文档，独立上下文）
        各自汇报结论 ──▶ 主 Claude 汇总 ──▶ 你</pre>

<h3>7.2 创建自定义 subagent</h3>
<p>会话内输入 <code class="inline">/agents</code> 可以交互式创建，本质是生成一个 markdown 文件（项目级放 <code class="inline">.claude/agents/</code>，个人级放 <code class="inline">~/.claude/agents/</code>）：</p>
<pre>---
name: code-reviewer
description: 代码审查专家。当需要审查代码改动、检查代码质量
  或安全隐患时使用。写代码任务完成后应主动使用本 agent 复查。
tools: Read, Grep, Glob
---

你是一位严格的高级代码审查员。审查时逐项检查：
1. 安全：XSS、注入、密钥泄露、权限缺口
2. 正确性:边界条件、空值处理、变量遮蔽
3. 一致性：是否违反项目 CLAUDE.md 的规范
输出格式：按 严重/建议/风格 三级列出问题，每条附文件名和行号。
只报告问题，不要动手修改。</pre>
<p>三个设计要点：① <b>description 决定它何时被自动派活</b>（和 Skill 同理）；② <b>tools 只给必需的</b>——审查员只需要读（Read/Grep/Glob），不给写权限，它就<b>物理上不可能</b>误改代码；③ 正文就是这个分身的 System Prompt（轨道 A 第 6 课的功力直接复用）。</p>

<h3>7.3 使用与并行</h3>
<p>可以点名：「用 code-reviewer 审查刚才的改动」；也可以并行派工：</p>
<pre>&gt; 同时做三件事：让 code-reviewer 审查 foodme.html 的改动；
  让 test-runner 跑全部测试；再开一个分身检查 zh/en/ms
  三语文案是否有遗漏。做完汇总给我。</pre>
<p>三个分身<b>同时</b>开工，总耗时约等于最慢的那个——这就是广告里「Agent Swarms（智能体集群）」的真身：没有魔法，就是<b>带独立上下文的并行子任务 + 一个汇总的项目经理</b>。</p>
<div class="warn">⚠️ 并行的边界：适合「互相独立」的子任务（审查、测试、检查互不干扰）。<b>会改同一批文件的任务不要并行</b>，会互相冲突。改代码串行做，检查类并行做。</div>

<h3>7.4 什么时候用 subagent？</h3>
<ul>
<li>✅ 大扫除式任务：全库安全审计、批量检查、多角度评审</li>
<li>✅ 写完代码后的独立复查（永远值得——分身没有「自己写的」包袱，挑错更狠）</li>
<li>✅ 研究类：派一个分身去读 50 个文件总结，主会话只收结论</li>
<li>❌ 简单小改动：开分身的调度开销反而更慢更贵</li>
</ul>
`,
en:`
<h3>7.1 Why clones?</h3>
<p>A single AI session has two natural bottlenecks:</p>
<ul>
<li><b>Context pollution</b>: researching first floods memory with 50 files; by coding time, the head is "cluttered"</li>
<li><b>Role conflict</b>: writer and reviewer being the same "person" makes review soft — it remembers why it wrote things and struggles to challenge itself</li>
</ul>
<p>The <span class="term">subagent</span> answer: the main AI is a project manager delegating subtasks to clones, <b>each with a clean, isolated context</b>. Clones report only conclusions; their working mess never enters the main session.</p>
<pre>You ──▶ Main Claude (PM, holds the big picture)
          ├─▶ Clone A: code reviewer (sees only the diff, isolated)
          ├─▶ Clone B: test engineer (runs tests only, isolated)
          └─▶ Clone C: docs checker (checks docs only, isolated)
        conclusions ──▶ Main Claude synthesizes ──▶ You</pre>

<h3>7.2 Creating a custom subagent</h3>
<p>Type <code class="inline">/agents</code> in-session for an interactive creator — under the hood it's a markdown file (project: <code class="inline">.claude/agents/</code>; personal: <code class="inline">~/.claude/agents/</code>):</p>
<pre>---
name: code-reviewer
description: Code review specialist. Use when reviewing changes,
  code quality or security. Should be used proactively after any
  code-writing task completes.
tools: Read, Grep, Glob
---

You are a strict senior code reviewer. Check systematically:
1. Security: XSS, injection, leaked secrets, permission gaps
2. Correctness: edge cases, null handling, variable shadowing
3. Consistency: violations of the project's CLAUDE.md conventions
Output: issues grouped Critical / Suggestion / Style, each with
file and line. Report only — never edit.</pre>
<p>Three design points: ① <b>the description controls when it's auto-delegated</b> (same as Skills); ② <b>grant only necessary tools</b> — a read-only reviewer (Read/Grep/Glob) is <b>physically incapable</b> of mangling code; ③ the body is this clone's system prompt (your Track A Lesson 6 craft transfers directly).</p>

<h3>7.3 Using and parallelizing</h3>
<p>Call by name: "have code-reviewer check the recent changes" — or dispatch in parallel:</p>
<pre>&gt; Do three things at once: code-reviewer reviews foodme.html's
  changes; test-runner runs the full suite; a third clone checks
  the zh/en/ms strings for gaps. Then synthesize for me.</pre>
<p>The three clones work <b>simultaneously</b>; total time ≈ the slowest one. That's the reality behind "Agent Swarms" in the ads: no magic — <b>parallel subtasks with isolated contexts + one synthesizing PM</b>.</p>
<div class="warn">⚠️ Parallel limits: great for <b>independent</b> subtasks (review, test, check don't collide). <b>Never parallelize tasks editing the same files</b> — they'll conflict. Edit serially; inspect in parallel.</div>

<h3>7.4 When to reach for subagents</h3>
<ul>
<li>✅ Sweep tasks: repo-wide security audits, batch checks, multi-angle reviews</li>
<li>✅ Independent post-write review (always worth it — a clone has no "I wrote this" bias and critiques harder)</li>
<li>✅ Research: send a clone to read 50 files; the main session receives only the conclusion</li>
<li>❌ Tiny edits: the delegation overhead makes it slower and pricier</li>
</ul>
`},
lab:{zh:`<h3>🧪 实验：组建你的第一支 AI 小队</h3>

<li>让主 Claude 先做一个小的代码修改，然后<b>主动</b>说：「用 code-reviewer 复查刚才的改动」</li>
<li>并行测试：让两个分身同时开工（一个审查一个查三语），观察输出是否互不干扰、主会话如何汇总</li>
<li>思考：审查员报出的问题里，有没有你和主 Claude 都没注意到的？（通常有——这就是独立上下文的价值）</li>
</ol>`,

<li>Have main Claude make a small code change, then explicitly say: "use code-reviewer to re-check that change"</li>
<li>Parallel test: run both clones at once (review + i18n); watch the outputs stay independent and the main session synthesize</li>
<li>Reflect: did the reviewer catch anything neither you nor main Claude noticed? (Usually yes — that's the value of an isolated context)</li>
</ol>`},

LESSONS.push({
id:"b8", track:"cc", num:8, minutes:45,
title:{zh:"多工具研究工作流：Plan Mode 与深度调研", en:"Multi-Tool Research Workflows: Plan Mode & Deep Investigation"},
objectives:{
 zh:["会用 Plan Mode 做「只研究不动手」的安全探索","掌握研究型任务的提问框架：范围+来源+产出格式","组合 文件搜索+网络搜索+subagent 做一次真正的深度调研","学会把调研产出沉淀为可复用的文档"],
 en:["Use Plan Mode for safe look-don't-touch exploration","Master the research prompt frame: scope + sources + output format","Combine file search + web search + subagents for real deep research","Persist research output into reusable documents"]
},
body:{zh:`
<h3>8.1 Plan Mode：先侦察，后开火</h3>
<p>按 <b>Shift+Tab</b> 可以切换到 <span class="term">Plan Mode（计划模式）</span>：这个模式下 AI <b>只能读和分析，不能改任何东西</b>，最后产出一份行动计划等你批准。这是第 2 课「先列计划再动手」习惯的制度化——从「靠你记得说」变成「模式保证」。</p>
<p>什么时候切：① 大改动前的方案设计；② 接手陌生代码库的摸底；③ 排查复杂 bug 时先纯分析。计划满意后退出 Plan Mode 再执行，或让它按计划开工。</p>

<h3>8.2 研究型任务的提问框架</h3>
<p>「帮我研究一下 X」是最低效的提问。高质量研究指令 = <b>范围 + 来源 + 产出格式</b>：</p>
<pre>&gt; 研究任务：评估 FoodMe 是否该从 GitHub Pages 迁移到 Cloudflare Pages。
  范围：只关注 加载速度、自定义域名、免费额度、部署流程 四个维度。
  来源：先读本项目现有部署配置，再上网查两个平台的官方文档与
       近一年的对比评测。
  产出：一份中文对比表 + 明确的迁移建议（做/不做/什么条件下做），
       存到 docs/research-hosting.md。</pre>
<p>拆解一下为什么每一块都必要：<b>范围</b>防止它漫游到无关话题烧 token；<b>来源</b>告诉它先内后外（先看你的实际情况，再查外部资料）；<b>产出格式</b>让结果直接可用而不是一坨聊天记录。</p>

<h3>8.3 组合拳：一次完整的深度调研</h3>
<p>把前几课全部串起来的实战范式：</p>
<pre>第一步（Plan Mode）：明确研究问题和调查计划
第二步（subagent 并行）：
   分身A → 扫描本地代码库，摸清现状
   分身B → 网络搜索外部资料、官方文档、社区经验
第三步（主会话）：交叉比对两边结论，找出矛盾点追问
第四步（产出）：写成结构化文档 + 给出带理由的建议
第五步（沉淀）：文档存入 docs/，重要结论用 # 写进 CLAUDE.md</pre>
<div class="tip">💡 第三步「找矛盾点」是深度调研和浅调研的分水岭。主动问它：「本地现状和外部最佳实践有哪些冲突？哪些外部建议不适用于我们的单文件架构？」——逼它做批判性比对，而不是资料堆砌。</div>

<h3>8.4 调研产出的沉淀纪律</h3>
<p>调研最大的浪费是「聊完就忘」。立下三条纪律：</p>
<ul>
<li>凡是超过 10 分钟的调研，产出一律写成 <code class="inline">docs/research-主题.md</code> 文件，不留在聊天里</li>
<li>影响长期决策的结论，用 <code class="inline">#</code> 写进 CLAUDE.md（例如 <code class="inline"># 经调研决定：继续使用 GitHub Pages，除非日活超过 5 万</code>）</li>
<li>文档开头写明调研日期——技术资料保鲜期短，半年后要重验</li>
</ul>
`,
en:`
<h3>8.1 Plan Mode: reconnaissance before firing</h3>
<p>Press <b>Shift+Tab</b> to enter <span class="term">Plan Mode</span>: the AI <b>can only read and analyze — it cannot change anything</b> — and finishes with an action plan awaiting your approval. It institutionalizes Lesson 2's plan-first habit: from "hoping you remember to say it" to "guaranteed by the mode".</p>
<p>When to switch: ① designing before a big change; ② scoping an unfamiliar codebase; ③ pure analysis while hunting a complex bug. Approve the plan, exit Plan Mode, execute.</p>

<h3>8.2 The research prompt frame</h3>
<p>"Research X for me" is the weakest possible ask. A quality research directive = <b>scope + sources + output format</b>:</p>
<pre>&gt; Research task: should FoodMe migrate from GitHub Pages to
  Cloudflare Pages?
  Scope: ONLY these four axes — load speed, custom domains,
  free-tier limits, deployment workflow.
  Sources: first read this project's current deploy config, then
  search both platforms' official docs and comparisons from the
  past year.
  Output: a comparison table + a firm recommendation
  (do / don't / do-if), saved to docs/research-hosting.md.</pre>
<p>Why each block matters: <b>scope</b> stops token-burning wandering; <b>sources</b> orders inside-first-then-outside (your reality before external opinion); <b>output format</b> makes the result usable, not a chat blob.</p>

<h3>8.3 The combo: one complete deep investigation</h3>
<pre>Step 1 (Plan Mode): pin the research question and investigation plan
Step 2 (parallel subagents):
   Clone A → sweep the local codebase, establish current state
   Clone B → web-search external docs, official sources, field reports
Step 3 (main session): cross-examine both sides, chase contradictions
Step 4 (output): structured document + reasoned recommendation
Step 5 (persist): file into docs/; key conclusions into CLAUDE.md via #</pre>
<div class="tip">💡 Step 3 — chasing contradictions — separates deep research from shallow. Ask explicitly: "where does our local reality conflict with external best practice? Which external advice does NOT apply to our single-file architecture?" — forcing critical comparison instead of citation piling.</div>

<h3>8.4 The persistence discipline</h3>
<p>Research's biggest waste is "chatted and forgotten". Three rules:</p>
<ul>
<li>Any research over 10 minutes gets written to <code class="inline">docs/research-topic.md</code> — never left in chat</li>
<li>Conclusions affecting long-term decisions go into CLAUDE.md via <code class="inline">#</code> (e.g. <code class="inline"># decided after research: stay on GitHub Pages unless DAU exceeds 50k</code>)</li>
<li>Date every document — technical findings expire; revalidate in six months</li>
</ul>
`},

objectives:{

body:{zh:`
<h3>9.1 为什么这一课以 Git 开场</h3>
<p>让 AI 大改你的心血项目，最大的心理障碍是「改坏了怎么办」。答案不是祈祷，是 <span class="term">Git</span>——它让任何改动都可以一键回滚。安全三件套：</p>
<pre># 1. 开一条实验分支（主干代码原封不动）
git checkout -b refactor/menu-module

# 2. AI 每完成一小步就提交一次（存档点）
git add -A && git commit -m "step 1: 提取菜单渲染函数"

# 3. 不满意？一键回到上一个存档点
git reset --hard HEAD~1
# 或整条分支不要了，回主干：
git checkout main</pre>
<p>有了这个安全网，你可以放心让 AI 大胆干活——最坏情况就是删掉分支，主干毫发无伤。<b>这也是为什么第 2 课叫你别急着开 yolo 模式：先有安全网，再谈放权。</b></p>

<h3>9.2 实战流程：五幕剧</h3>
<p><b>第一幕·摸底（Plan Mode）</b>：</p>
<pre>&gt; [Plan Mode] 分析 foodme.html 的菜单模块（menu 相关的所有函数）。
  我想重构目标：① 消除重复代码 ② option-groups 的 set/additive
  两种计价逻辑分离清楚 ③ 不改变任何现有行为。
  给我一份分步重构计划，每步要小到可以独立提交和验证。</pre>
<p><b>第二幕·审计划</b>：重点看两件事——步骤够不够小（一步一提交）；有没有「顺手优化」的越界项（重构铁律：<b>行为不变</b>，优化另开任务）。</p>
<p><b>第三幕·分步执行</b>：批准后让它做第 1 步 → 你浏览器里手动点一遍菜单功能 → 没问题就 commit → 再做第 2 步。<b>节奏感是关键：小步、验证、存档、再小步。</b></p>
<p><b>第四幕·独立复查</b>：全部步骤完成后，召唤第 7 课的 code-reviewer 分身审整个分支的 diff：</p>
<pre>&gt; 用 code-reviewer 审查本分支相对 main 的全部改动，
  特别检查：行为是否可能改变、有没有引入变量遮蔽、
  是否违反 CLAUDE.md 的三语和单文件铁律。</pre>
<p><b>第五幕·回归验证与合并</b>：按一份固定清单人工过一遍核心功能（点餐→加购→选项组→结账→订单显示），全绿则 <code class="inline">git checkout main && git merge refactor/menu-module</code>。</p>

<h3>9.3 大改动的回归清单怎么写</h3>
<p>让 AI 帮你生成并存进项目：</p>
<pre>&gt; 根据本项目功能，生成一份 docs/regression-checklist.md：
  列出每次大改动后必须人工验证的 15 个核心操作，按
  「商家端 / 顾客端 / 管理端」分组，每条一句话可勾选。</pre>
<p>以后每次大改动的第五幕都用这份清单，不靠临场回忆。</p>
<div class="warn">⚠️ 常见翻车：一次让 AI 改太多。「重构整个文件」这种指令 = 巨大 diff = 没法审查 = 出错找不到源头。永远拆小步。你在 MANI 一万多行的系统上更要如此。</div>
`,
en:`
<h3>9.1 Why this lesson opens with Git</h3>
<p>The biggest mental block to letting AI overhaul your baby is "what if it breaks?". The answer isn't prayer — it's <span class="term">Git</span>: every change becomes one-command reversible. The safety kit:</p>
<pre># 1. Cut an experiment branch (main stays untouched)
git checkout -b refactor/menu-module

# 2. Commit after every small AI step (save points)
git add -A && git commit -m "step 1: extract menu render function"

# 3. Unhappy? Jump back one save point
git reset --hard HEAD~1
# Or abandon the whole branch and return to main:
git checkout main</pre>
<p>With this net, you can let AI work boldly — worst case, delete the branch; main is unharmed. <b>This is why Lesson 2 said no yolo mode yet: safety net first, autonomy second.</b></p>

<h3>9.2 The project: a five-act play</h3>
<p><b>Act 1 · Scope (Plan Mode)</b>:</p>
<pre>&gt; [Plan Mode] Analyze foodme.html's menu module (all menu-related
  functions). Refactor goals: ① remove duplication ② cleanly
  separate the set/additive pricing logic of option-groups
  ③ change NO existing behavior.
  Give me a staged plan where every step is small enough to
  commit and verify independently.</pre>
<p><b>Act 2 · Review the plan</b>: check two things — are steps small enough (one commit each)? any sneaky "while we're here" optimizations? (Refactor iron law: <b>behavior unchanged</b>; optimizations are a separate task.)</p>
<p><b>Act 3 · Staged execution</b>: approve → it does step 1 → you click through the menu in a browser → good? commit → step 2. <b>Rhythm is everything: small step, verify, save, next.</b></p>
<p><b>Act 4 · Independent review</b>: when all steps finish, summon Lesson 7's code-reviewer on the whole branch diff:</p>
<pre>&gt; Use code-reviewer on this branch's full diff vs main. Check
  especially: possible behavior changes, introduced variable
  shadowing, violations of CLAUDE.md's trilingual and
  single-file iron rules.</pre>
<p><b>Act 5 · Regression & merge</b>: walk a fixed checklist of core flows by hand (order → add to cart → option groups → checkout → order display); all green → <code class="inline">git checkout main && git merge refactor/menu-module</code>.</p>

<h3>9.3 Writing the regression checklist</h3>
<p>Have the AI generate and store it:</p>
<pre>&gt; From this project's features, generate docs/regression-checklist.md:
  the 15 core operations to verify by hand after any big change,
  grouped Merchant / Customer / Admin, one checkable line each.</pre>
<p>Every future Act 5 uses this list — never on-the-spot memory.</p>
<div class="warn">⚠️ The classic crash: asking AI to change too much at once. "Refactor the whole file" = giant diff = unreviewable = untraceable bugs. Always slice small — doubly so in your 11,000-line MANI system.</div>
`},
lab:{zh:`<h3>🧪 实验：完整五幕（用副本练）</h3>

<li>第三幕：执行第 1 步 → 手动验证 → commit;完成全部步骤,每步都有独立 commit</li>
<li>第四幕：code-reviewer 审全分支 diff，把它报的问题修掉再 commit</li>
<li>第五幕：生成回归清单 → 人工过一遍 → 合并回 main</li>
<li>加练：故意用 <code class="inline">git reset --hard HEAD~1</code> 回滚一步再重做——亲手体验「一键撤销」，恐惧感会消失大半</li>
</ol>`,
en:`<h3>🧪 Lab: the full five acts (on a copy)</h3>

<li>Act 3: execute step 1 → verify by hand → commit; finish all steps, one commit each</li>
<li>Act 4: code-reviewer on the branch diff; fix its findings, commit</li>

title:{zh:"实战②：搭一条 AUDO 能卖的「客户情报→报价书」流水线", en:"Project 2: A Sellable AUDO Pipeline — Client Intel → Quotation"},

body:{zh:`
<h3>10.1 毕业作品蓝图</h3>
<p>场景：AUDO 收到新询价（轨道 A 第 8 课的机器人已经把客户资料记进了表格/文件）。现在的目标——<b>一条命令，产出一份可以直接发给客户的专业报价书</b>：</p>
<pre>输入：clients/incoming/tan-kopitiam.md（客户需求记录）
  │
  ▼  claude -p 触发流水线
① 读取客户需求 + 调用 audo-services 技能（服务目录与定价规则）
② subagent 调研：该行业的典型需求与方案要点

④ code-reviewer 式复查：核对价格计算、条款完整性、SST
  │
  ▼
输出：quotes/tan-kopitiam-quote.md（+ 老板审核清单）</pre>

<h3>10.2 四层架构：这才是「系统」而不是「一堆提示词」</h3>
<table>
<tr><th>层</th><th>放什么</th><th>用到的课</th></tr>
<tr><td><b>数据层</b></td><td>clients/ 文件夹结构 + 客户资料模板（统一字段：行业/规模/需求/预算信号）</td><td>B2 文件操作</td></tr>
<tr><td><b>技能层</b></td><td>audo-services（服务目录+定价规则表）、audo-quote（报价书格式+条款+SST 规则）两个 Skill</td><td>B4 Skills</td></tr>
<tr><td><b>执行层</b></td><td>CLAUDE.md 写死铁律（禁止超出定价表报价、金额两位小数、必须含有效期）；quote-checker subagent 独立复核</td><td>B3 + B7</td></tr>
<tr><td><b>交付层</b></td><td>claude -p 一键触发；未来可接 n8n：表格新增一行自动跑</td><td>B6 + 轨道A</td></tr>
</table>
<p>核心工程思想：<b>知识进技能层，纪律进执行层，流程进交付层</b>——提示词不再是散落的咒语，而是有结构的资产。客户换了、价格改了，只改技能文件，流水线本身不动。</p>

<li><b>复利</b>：每接一个新客户，把新行业知识沉淀进技能文件。半年后你拥有的不是聊天记录，是一套<b>越用越值钱的知识资产</b>。这是那些两天课程给不了你的东西</li>
</ul>
`,
en:`
<h3>10.1 The capstone blueprint</h3>
<p>Scenario: AUDO receives a new enquiry (Track A Lesson 8's bot already logged the client's details). The goal — <b>one command produces a client-ready professional quotation</b>:</p>
<pre>Input: clients/incoming/tan-kopitiam.md (client needs record)
  │
  ▼  claude -p fires the pipeline
① Read the needs + invoke audo-services skill (catalog & pricing rules)
② Subagent research: the industry's typical needs & solution notes
③ Draft the quotation (audo-quote skill enforces the format)
④ Reviewer-style check: price math, term completeness, SST

<h3>10.2 Four layers: a SYSTEM, not a pile of prompts</h3>
<table>
<tr><th>Layer</th><th>Contents</th><th>Lessons used</th></tr>
<tr><td><b>Data</b></td><td>clients/ folder structure + client record template (unified fields: industry / size / needs / budget signals)</td><td>B2 file ops</td></tr>
<tr><td><b>Skills</b></td><td>audo-services (catalog + pricing table) and audo-quote (format + terms + SST rules)</td><td>B4 Skills</td></tr>

<tr><td><b>Delivery</b></td><td>claude -p one-shot trigger; later wire n8n: new sheet row → auto-run</td><td>B6 + Track A</td></tr>
</table>
<p>The engineering idea: <b>knowledge into skills, discipline into execution, process into delivery</b> — prompts stop being scattered spells and become structured assets. New client? New prices? Edit the skill files; the pipeline never changes.</p>

<div class="warn">⚠️ Delivery red line (into CLAUDE.md AND your service contracts): <b>AI-generated quotations must be human-reviewed and signed off</b>. The pitch is "a 90-point draft in 10 minutes", not "unmanned quoting". A misplaced zero is a liability neither the AI nor you can carry.</div>

/* ================= APP LOGIC ================= */

let LANG = "zh";
let doneSet = {};          // { lessonId: true }
let memoryOnly = false;    // fallback if window.storage unavailable

async function loadState(){
  try{
    if(window.storage){
      const p = await window.storage.get("academy-progress").catch(()=>null);
      if(p && p.value) doneSet = JSON.parse(p.value);
      const l = await window.storage.get("academy-lang").catch(()=>null);
      if(l && l.value) LANG = l.value;
    } else { memoryOnly = true; }
  }catch(e){ memoryOnly = true; }
}
async function saveProgress(){
  if(memoryOnly) return;
  try{ await window.storage.set("academy-progress", JSON.stringify(doneSet)); }catch(e){}
}
async function saveLang(){
  if(memoryOnly) return;
  try{ await window.storage.set("academy-lang", LANG); }catch(e){}
}

function t(key){ return I18N[LANG][key]; }
function esc(s){ return s; }

/* ---------- Sidebar ---------- */
function buildSidebar(){
  const navA = document.getElementById("navN8n");
  const navB = document.getElementById("navCc");
  navA.innerHTML = ""; navB.innerHTML = "";
  let dA=0,dB=0;
  LESSONS.forEach(les=>{
    const li = document.createElement("li");
    li.id = "nav-"+les.id;
    if(doneSet[les.id]) li.classList.add("done");
    const a = document.createElement("a");
    a.href = "#"+les.id;
    a.innerHTML = '<span class="dot"></span><span><span class="lnum">'+
      (les.track==="n8n"?"A":"B")+les.num+" · "+les.minutes+" "+t("mins")+
      '</span>'+les.title[LANG]+"</span>";
    li.appendChild(a);
    if(les.track==="n8n"){ navA.appendChild(li); if(doneSet[les.id])dA++; }
    else { navB.appendChild(li); if(doneSet[les.id])dB++; }
  });
  document.getElementById("cntN8n").textContent = dA+"/8";
  document.getElementById("cntCc").textContent = dB+"/10";
  const total = Object.keys(doneSet).filter(k=>doneSet[k]).length;
  document.getElementById("pillProgress").textContent = total + t("progress_of");
  // i18n static labels
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = t(el.dataset.i18n); });
}

/* ---------- Home ---------- */
function renderHome(){
  const main = document.getElementById("main");
  const dA = LESSONS.filter(l=>l.track==="n8n"&&doneSet[l.id]).length;
  const dB = LESSONS.filter(l=>l.track==="cc"&&doneSet[l.id]).length;
  let html = '<div class="hero"><h1 class="serif">'+t("hero_t")+'</h1><p>'+t("hero_p")+'</p>'+
    '<a class="cta" href="#a1">'+t("hero_cta")+'</a></div>';
  html += '<div class="track-cards">'+
    '<div class="tcard"><h2>'+t("track_n8n")+'</h2><p>'+t("tcard_a_p")+'</p>'+
    '<div class="tbar"><i style="width:'+(dA/8*100)+'%"></i></div><div class="tbar-label">'+dA+' / 8 '+t("done_of")+'</div></div>'+
    '<div class="tcard cc"><h2>'+t("track_cc")+'</h2><p>'+t("tcard_b_p")+'</p>'+
    '<div class="tbar"><i style="width:'+(dB/10*100)+'%"></i></div><div class="tbar-label">'+dB+' / 10 '+t("done_of")+'</div></div></div>';
  html += '<div class="notice">'+t("notice")+'</div>';
  html += '<h2 class="sec serif">'+t("sec_a")+'</h2><div class="home-list">';
  LESSONS.filter(l=>l.track==="n8n").forEach(l=>{
    html += '<a href="#'+l.id+'"><span class="n">A'+l.num+'</span><span>'+l.title[LANG]+'</span>'+
      (doneSet[l.id]?'<span class="tick">✔</span>':'')+'<span class="mins">'+l.minutes+' '+t("mins")+'</span></a>';
  });
  html += '</div><h2 class="sec serif">'+t("sec_b")+'</h2><div class="home-list cc">';
  LESSONS.filter(l=>l.track==="cc").forEach(l=>{
    html += '<a href="#'+l.id+'"><span class="n">B'+l.num+'</span><span>'+l.title[LANG]+'</span>'+
      (doneSet[l.id]?'<span class="tick">✔</span>':'')+'<span class="mins">'+l.minutes+' '+t("mins")+'</span></a>';
  });
  html += '</div>';
  main.innerHTML = html;
  window.scrollTo(0,0);
}

/* ---------- Lesson ---------- */
function renderLesson(les){
  const main = document.getElementById("main");
  const idx = LESSONS.indexOf(les);
  const trackName = les.track==="n8n" ? t("track_n8n") : t("track_cc");
  const prefix = (les.track==="n8n"?"A":"B")+les.num;

  let html = '<div class="crumb '+(les.track==="cc"?"cc":"")+'"><a href="#home" style="color:inherit">'+t("nav_home")+'</a> / <b>'+trackName+'</b> / '+prefix+'</div>';
  html += '<h1 class="ltitle">'+prefix+' · '+les.title[LANG]+'</h1>';
  html += '<div class="lmeta"><span>⏱ '+les.minutes+' '+t("mins")+'</span></div>';
  html += '<div class="obj '+(les.track==="n8n"?"n8n":"")+'"><h3>'+t("obj_t")+'</h3><ul>'+
    les.objectives[LANG].map(o=>'<li>'+o+'</li>').join("")+'</ul></div>';
  html += '<div class="lesson-body">'+les.body[LANG]+'</div>';
  html += '<div class="lab"><span class="lab-badge">'+t("lab_t")+'</span><div class="lesson-body">'+les.lab[LANG]+'</div></div>';
  html += '<div class="hw"><h3>'+t("hw_t")+'</h3><p style="font-size:14.5px">'+les.homework[LANG]+'</p></div>';

  // quiz
  html += '<div class="quiz"><h3>'+t("quiz_t")+'</h3>';
  les.quiz.forEach((qz,qi)=>{
    html += '<div class="qitem"><div class="q">'+(qi+1)+'. '+qz.q[LANG]+'</div>';
    qz.opts.forEach((op,oi)=>{
      html += '<button class="qopt" data-q="'+qi+'" data-o="'+oi+'">'+op[LANG]+'</button>';
    });
    html += '<div class="qexp" id="exp-'+qi+'"></div></div>';
  });
  html += '</div>';

  // footer nav
  const isDone = !!doneSet[les.id];
  html += '<div class="lfoot">';
  if(idx>0) html += '<a class="btn ghost" href="#'+LESSONS[idx-1].id+'">'+t("prev")+'</a>';
  html += '<button class="btn done-btn '+(isDone?"":"undone")+'" id="btnDone">'+(isDone?t("marked"):t("mark_done"))+'</button>';
  if(idx<LESSONS.length-1) html += '<a class="btn nav-btn" href="#'+LESSONS[idx+1].id+'">'+t("next")+'</a>';
  else html += '<a class="btn nav-btn" href="#home">'+t("back_home")+'</a>';
  html += '</div>';

  main.innerHTML = html;
  window.scrollTo(0,0);

  // copy buttons
  main.querySelectorAll("pre").forEach(pre=>{
    const btn = document.createElement("button");
    btn.className = "copy"; btn.textContent = t("copy");
    btn.addEventListener("click", ()=>{
      const txt = pre.innerText.replace(t("copied"),"").replace(t("copy"),"").trim();
      navigator.clipboard.writeText(txt).then(()=>{
        btn.textContent = t("copied");
        setTimeout(()=>btn.textContent=t("copy"),1500);
      });
    });
    pre.appendChild(btn);
  });

  // quiz handlers
  main.querySelectorAll(".qopt").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const qi = +btn.dataset.q, oi = +btn.dataset.o;
      const qz = les.quiz[qi];
      const group = main.querySelectorAll('.qopt[data-q="'+qi+'"]');
      group.forEach(b=>{ b.classList.remove("correct","wrong"); });
      const exp = document.getElementById("exp-"+qi);
      if(oi===qz.correct){
        btn.classList.add("correct");
        exp.innerHTML = "<b>"+t("correct")+"</b> "+qz.exp[LANG];
      } else {
        btn.classList.add("wrong");
        group[qz.correct].classList.add("correct");
        exp.innerHTML = "<b>"+t("wrong")+"</b> "+qz.exp[LANG];
      }
      exp.classList.add("show");
    });
  });

  // done button
  document.getElementById("btnDone").addEventListener("click", async ()=>{
    doneSet[les.id] = !doneSet[les.id];
    if(!doneSet[les.id]) delete doneSet[les.id];
    await saveProgress();
    buildSidebar();
    renderLesson(les);
  });

  // highlight sidebar
  document.querySelectorAll(".metro li").forEach(li=>li.classList.remove("active"));
  const cur = document.getElementById("nav-"+les.id);
  if(cur) cur.classList.add("active");
}

/* ---------- Router ---------- */
function route(){
  const hash = (location.hash||"#home").slice(1);
  const les = LESSONS.find(l=>l.id===hash);
  buildSidebar();
  if(les) renderLesson(les); else renderHome();
  document.getElementById("sidebar").classList.remove("open");
}

/* ---------- Language ---------- */
function setLang(l){
  LANG = l;
  document.documentElement.lang = (l==="zh"?"zh":"en");
  document.getElementById("btnZh").classList.toggle("on", l==="zh");
  document.getElementById("btnEn").classList.toggle("on", l==="en");
  saveLang();
  route();
}

/* ---------- Init ---------- */
(async function init(){
  await loadState();
  document.getElementById("btnZh").addEventListener("click", ()=>setLang("zh"));
  document.getElementById("btnEn").addEventListener("click", ()=>setLang("en"));
  document.getElementById("menuBtn").addEventListener("click", ()=>{
    document.getElementById("sidebar").classList.toggle("open");
  });
  window.addEventListener("hashchange", route);
  setLang(LANG);
})();
</script>
</body>
</html>
