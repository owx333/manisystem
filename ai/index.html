<style>
:root{
  --ink:#101A33;          /* 深墨蓝 deep ink navy */
  --ink-2:#1B2A4E;
  --paper:#FAF7F1;        /* 米纸 parchment */
  --card:#FFFFFF;
  --text:#1D2433;
  --muted:#68718A;
  --gold:#C9A24B;         /* Claude 轨 gold line */
  --gold-soft:#F3E9D2;
  --rose:#E05572;         /* n8n 轨 rose line */
  --rose-soft:#FBE4EA;
  --green:#2E9E6B;
  --line:#E6E1D6;
  --radius:14px;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans SC','Inter',sans-serif;background:var(--paper);color:var(--text);line-height:1.75;font-size:16px}
.serif{font-family:'Noto Serif SC','Fraunces',serif}

/* ===== Top bar ===== */
.topbar{position:sticky;top:0;z-index:50;background:var(--ink);color:#F5EFE2;display:flex;align-items:center;gap:12px;padding:10px 16px;box-shadow:0 2px 12px rgba(16,26,51,.25)}
.topbar .logo{font-family:'Noto Serif SC','Fraunces',serif;font-weight:800;font-size:18px;letter-spacing:.5px}
.topbar .logo b{color:var(--gold)}
.topbar .spacer{flex:1}
.progress-pill{font-size:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);padding:4px 12px;border-radius:99px;white-space:nowrap}
.lang-toggle{display:flex;border:1px solid rgba(255,255,255,.25);border-radius:99px;overflow:hidden}
.lang-toggle button{background:transparent;color:#CBD3E5;border:none;padding:5px 14px;font-size:13px;cursor:pointer;font-family:inherit}
.lang-toggle button.on{background:var(--gold);color:var(--ink);font-weight:700}
.menu-btn{display:none;background:transparent;border:1px solid rgba(255,255,255,.25);color:#F5EFE2;border-radius:8px;padding:5px 10px;font-size:16px;cursor:pointer}

/* ===== Layout ===== */
.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 52px)}
.sidebar{background:#FFFDF8;border-right:1px solid var(--line);padding:20px 0 40px;overflow-y:auto;max-height:calc(100vh - 52px);position:sticky;top:52px}
.main{padding:28px 22px 80px;max-width:860px;margin:0 auto;width:100%}

/* ===== Metro-line nav (signature) ===== */
.track-head{padding:8px 20px 4px;display:flex;align-items:baseline;gap:8px;cursor:pointer}
.track-head .tname{font-family:'Noto Serif SC',serif;font-weight:800;font-size:15px}
.track-head .tcount{font-size:12px;color:var(--muted)}
.track-head.n8n .tname{color:var(--rose)}
.track-head.cc .tname{color:#9A7A2E}
.metro{list-style:none;margin:2px 0 18px;position:relative}
.metro li{position:relative}
.metro a{display:flex;align-items:flex-start;gap:12px;padding:8px 20px 8px 24px;text-decoration:none;color:var(--text);font-size:13.5px;line-height:1.45;border-left:none}
.metro a:hover{background:#F6F1E4}
.metro .dot{flex:0 0 14px;width:14px;height:14px;border-radius:50%;border:3px solid var(--line);background:#fff;margin-top:3px;position:relative;z-index:2;transition:all .2s}
.metro.n8n .dot{border-color:#F1B9C6}
.metro.cc .dot{border-color:#E4D3A8}
.metro li.done .dot{background:var(--green);border-color:var(--green)}
.metro li.active a{background:#F3ECDA;font-weight:700}
.metro li.active .dot{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
.metro.n8n li.active .dot{border-color:var(--rose);box-shadow:0 0 0 4px var(--rose-soft)}
.metro::before{content:'';position:absolute;left:29px;top:10px;bottom:10px;width:3px;border-radius:3px;z-index:1}
.metro.n8n::before{background:linear-gradient(var(--rose),#F1B9C6)}
.metro.cc::before{background:linear-gradient(var(--gold),#E4D3A8)}
.metro .lnum{font-family:var(--mono);font-size:10.5px;color:var(--muted);display:block}
.home-link{display:block;padding:10px 20px;margin-bottom:6px;font-weight:700;color:var(--ink);text-decoration:none;font-size:14px}
.home-link:hover{background:#F6F1E4}

/* ===== Home / dashboard ===== */
.hero{background:var(--ink);color:#F5EFE2;border-radius:20px;padding:40px 34px;position:relative;overflow:hidden;margin-bottom:26px}
.hero::after{content:'';position:absolute;right:-60px;top:-60px;width:260px;height:260px;border-radius:50%;border:34px solid rgba(201,162,75,.14)}
.hero h1{font-family:'Noto Serif SC','Fraunces',serif;font-weight:800;font-size:clamp(24px,4vw,36px);line-height:1.3;margin-bottom:12px}
.hero h1 b{color:var(--gold)}
.hero p{max-width:560px;color:#C9D1E4;font-size:15px}
.hero .cta{display:inline-block;margin-top:20px;background:var(--gold);color:var(--ink);font-weight:700;padding:11px 26px;border-radius:99px;text-decoration:none;font-size:14.5px}
.track-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:26px}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;border-top:5px solid var(--rose)}
.tcard.cc{border-top-color:var(--gold)}
.tcard h2{font-family:'Noto Serif SC',serif;font-size:19px;margin-bottom:6px}
.tcard p{font-size:13.5px;color:var(--muted);margin-bottom:12px}
.tbar{height:8px;background:#EFEAE0;border-radius:99px;overflow:hidden;margin-bottom:6px}
.tbar i{display:block;height:100%;border-radius:99px;background:var(--rose);transition:width .4s}
.tcard.cc .tbar i{background:var(--gold)}
.tbar-label{font-size:12px;color:var(--muted)}
.notice{background:#FFF9EA;border:1px solid #EAD9A8;border-radius:var(--radius);padding:16px 18px;font-size:13.5px;margin-bottom:26px}
.notice b{color:#8A6A1E}
.home-list{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:6px 0;margin-bottom:16px}
.home-list a{display:flex;gap:12px;align-items:baseline;padding:11px 20px;text-decoration:none;color:var(--text);font-size:14px;border-bottom:1px solid #F1EDE3}
.home-list a:last-child{border-bottom:none}
.home-list a:hover{background:#FBF7EC}
.home-list .n{font-family:var(--mono);font-size:11px;color:#fff;background:var(--rose);border-radius:6px;padding:1px 7px;flex:0 0 auto}
.home-list.cc .n{background:var(--gold);color:var(--ink)}
.home-list .mins{margin-left:auto;font-size:12px;color:var(--muted);flex:0 0 auto}
.home-list .tick{color:var(--green);font-weight:700;flex:0 0 auto}
h2.sec{font-family:'Noto Serif SC',serif;font-size:20px;margin:8px 0 12px}

/* ===== Lesson page ===== */
.crumb{font-size:12.5px;color:var(--muted);margin-bottom:10px}
.crumb b{color:var(--rose)}
.crumb.cc b{color:#9A7A2E}
.ltitle{font-family:'Noto Serif SC','Fraunces',serif;font-weight:800;font-size:clamp(22px,3.4vw,30px);line-height:1.35;margin-bottom:8px}
.lmeta{font-size:13px;color:var(--muted);margin-bottom:22px;display:flex;gap:14px;flex-wrap:wrap}
.obj{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--gold);border-radius:10px;padding:16px 20px;margin-bottom:26px}
.obj.n8n{border-left-color:var(--rose)}
.obj h3{font-size:14px;margin-bottom:8px;font-family:'Noto Serif SC',serif}
.obj ul{padding-left:20px;font-size:14px}
.lesson-body h3{font-family:'Noto Serif SC',serif;font-size:18.5px;margin:30px 0 10px;padding-top:6px}
.lesson-body h4{font-size:15px;margin:20px 0 8px}
.lesson-body p{margin-bottom:12px;font-size:15px}
.lesson-body ul,.lesson-body ol{padding-left:24px;margin-bottom:14px;font-size:15px}
.lesson-body li{margin-bottom:6px}
.lesson-body table{border-collapse:collapse;width:100%;font-size:13.5px;margin-bottom:16px}
.lesson-body th,.lesson-body td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top}
.lesson-body th{background:#F4EFE2;font-family:'Noto Serif SC',serif}
.tip{background:#EDF7F1;border:1px solid #BFE3CE;border-radius:10px;padding:12px 16px;font-size:13.5px;margin:14px 0}
.warn{background:#FDF1F3;border:1px solid #F2C7D1;border-radius:10px;padding:12px 16px;font-size:13.5px;margin:14px 0}
.term{background:var(--gold-soft);border-radius:5px;padding:0 5px;font-weight:500}
pre{background:var(--ink);color:#E8ECF6;border-radius:12px;padding:16px 18px;font-family:var(--mono);font-size:12.8px;line-height:1.6;overflow-x:auto;margin:12px 0 18px;position:relative}
pre .copy{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.1);color:#CBD3E5;border:1px solid rgba(255,255,255,.2);border-radius:7px;font-size:11px;padding:3px 10px;cursor:pointer;font-family:'Noto Sans SC',sans-serif}
pre .copy:hover{background:rgba(255,255,255,.2)}
code.inline{font-family:var(--mono);font-size:.88em;background:#EFEAE0;border-radius:5px;padding:1px 6px}
.lab{background:linear-gradient(180deg,#FFFDF6,#FBF5E6);border:1px solid #E8DCB8;border-radius:var(--radius);padding:20px 22px;margin:26px 0}
.lab h3{margin-top:0!important}
.lab-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:1px;background:var(--ink);color:var(--gold);padding:3px 12px;border-radius:99px;margin-bottom:10px}
.hw{background:#F2F4FB;border:1px solid #CBD4EE;border-radius:var(--radius);padding:18px 22px;margin:24px 0}
.hw h3{margin-top:0!important;font-family:'Noto Serif SC',serif;font-size:16px}

/* ===== Quiz ===== */
.quiz{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin:26px 0}
.quiz h3{margin-top:0!important;font-family:'Noto Serif SC',serif;font-size:17px}
.qitem{margin-bottom:18px}
.qitem .q{font-weight:700;font-size:14.5px;margin-bottom:8px}
.qopt{display:block;width:100%;text-align:left;background:#FBF9F3;border:1.5px solid var(--line);border-radius:9px;padding:9px 14px;margin-bottom:7px;font-size:14px;cursor:pointer;font-family:inherit;transition:all .15s}
.qopt:hover{border-color:var(--gold)}
.qopt.correct{background:#E7F6EE;border-color:var(--green);font-weight:700}
.qopt.wrong{background:#FDECEF;border-color:var(--rose)}
.qexp{display:none;font-size:13px;background:#F4EFE2;border-radius:8px;padding:10px 14px;margin-top:4px}
.qexp.show{display:block}

/* ===== Lesson footer nav ===== */
.lfoot{display:flex;gap:12px;align-items:center;margin-top:36px;flex-wrap:wrap}
.btn{border:none;border-radius:99px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block}
.btn.done-btn{background:var(--green);color:#fff}
.btn.done-btn.undone{background:#EFEAE0;color:var(--muted)}
.btn.nav-btn{background:var(--ink);color:#F5EFE2}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--text)}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:52px;width:290px;max-height:calc(100vh - 52px);transform:translateX(-100%);transition:transform .25s;z-index:40;box-shadow:8px 0 30px rgba(0,0,0,.12)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:block}
  .track-cards{grid-template-columns:1fr}
  .main{padding:20px 16px 70px}
}
::selection{background:var(--gold-soft)}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:4px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

    nav_home:"🏠 学习总览",

  },
  en:{
    nav_home:"🏠 Overview",

const LESSONS = [];

/* ================= TRACK A · n8n (Lessons 1–4) ================= */

LESSONS.push({
id:"a1", track:"n8n", num:1, minutes:40,
title:{zh:"入门与安装：什么是自动化？", en:"Getting Started: What is Automation?"},
objectives:{
 zh:["理解什么是工作流自动化，n8n 解决什么问题","认识三个核心概念：节点、触发器、执行","在自己电脑上免费装好 n8n 并成功打开界面"],
 en:["Understand what workflow automation is and the problem n8n solves","Learn the 3 core concepts: node, trigger, execution","Install n8n locally for free and open the editor"]

body:{zh:`
<h3>1.1 用一个故事理解自动化</h3>
<p>想象你开一家小店。每天早上你都要做同样的事：打开 Excel 看昨天的订单 → 抄进报表 → 写一封总结邮件发给老板。这三步每天花你 30 分钟，一年就是 180 个小时。</p>
<p><span class="term">自动化（Automation）</span>就是让电脑替你做这种「有固定步骤的重复工作」。你只需要把步骤画出来一次，电脑就会每天准时、零出错地帮你执行。</p>
<p><b>n8n</b>（读作 n-eight-n）就是一个画这种流程图的工具。它是开源的，意思是代码公开，你可以<b>免费</b>装在自己电脑或服务器上，不需要付月费。市面上类似的工具还有 Zapier 和 Make，但它们按次数收费，n8n 自己架设则完全免费。</p>

<h3>1.2 三个必懂的核心概念</h3>
<table>
<tr><th>概念</th><th>白话解释</th><th>比喻</th></tr>
<tr><td><b>节点 Node</b></td><td>流程里的一个步骤，例如「读取 Google Sheets」或「发一封 Email」</td><td>流水线上的一个工人</td></tr>
<tr><td><b>触发器 Trigger</b></td><td>整条流程的起点，决定「什么时候开始跑」。例如：每天早上 9 点、或收到一条新表单</td><td>工厂的开工铃声</td></tr>
<tr><td><b>执行 Execution</b></td><td>流程从头到尾跑一次的记录。可以查看每一步的输入输出，方便排错</td><td>一张生产记录单</td></tr>
</table>
<p>一条完整的工作流（Workflow）就是：<b>1 个触发器 + 若干个节点</b>，用线连起来。数据像水一样从左流到右。</p>

<h3>1.3 安装 n8n（两种免费方式）</h3>
<h4>方式一：最快尝鲜（适合今天就想玩）</h4>
<p>前提：电脑装有 <a href="https://nodejs.org" target="_blank">Node.js</a>（18 或以上版本）。打开终端（Windows 用 PowerShell，Mac 用 Terminal），输入：</p>
<pre>npx n8n</pre>
<p>第一次会自动下载，几分钟后看到 <code class="inline">Editor is now accessible via: http://localhost:5678</code>，用浏览器打开这个网址，注册一个本地账号，就能看到 n8n 的画布了。</p>
<h4>方式二：Docker 安装（适合长期使用，推荐）</h4>
<p><span class="term">Docker</span> 是一个「软件集装箱」工具——把 n8n 和它需要的一切打包在一个箱子里运行，不会弄乱你的电脑。先到 docker.com 安装 Docker Desktop，然后运行：</p>
<pre>docker volume create n8n_data
docker run -d --name n8n -p 5678:5678 -v n8n_data:/home/node/.n8n docker.n8n.io/n8nio/n8n</pre>
<p>逐个参数看懂它：</p>
<ul>
<li><code class="inline">-d</code>：在背景运行（关掉终端也不会停）</li>
<li><code class="inline">--name n8n</code>：给这个容器取名，方便以后管理</li>
<li><code class="inline">-p 5678:5678</code>：把容器的 5678 端口接到你电脑的 5678 端口</li>
<li><code class="inline">-v n8n_data:...</code>：把数据存在名为 n8n_data 的空间里，这样重启后你做的工作流<b>不会消失</b></li>
</ul>
<p>之后想停止就 <code class="inline">docker stop n8n</code>，想再开就 <code class="inline">docker start n8n</code>。</p>
<div class="tip">💡 <b>本地 vs 云端：</b>本地安装的 n8n 只有你电脑开机时才会跑。等你学到第 7 课要做「每天自动执行」的流程时，我们再谈把它放上便宜的云服务器（VPS，每月约 RM20）让它 24 小时运行。现阶段本地完全够用。</div>

<h3>1.4 认识界面</h3>
<p>打开 n8n 后你会看到：</p>
<ul>
<li><b>画布（Canvas）</b>：中间的大空白区，你的流程图画在这里</li>
<li><b>➕ 加号按钮</b>：点它添加节点，可以搜索几百种应用（Gmail、Sheets、Telegram、HTTP……）</li>
<li><b>左侧栏</b>：Workflows（你所有的工作流）、Credentials（保存的账号授权）、Executions（历史执行记录）</li>
<li><b>右上角 Active 开关</b>：打开后工作流才会「自动」按触发器运行；没打开时只能手动测试</li>
</ul>
`,
en:`
<h3>1.1 Understand automation through a story</h3>
<p>Imagine you run a small shop. Every morning you do the same thing: open Excel to check yesterday's orders → copy them into a report → email a summary to your boss. That's 30 minutes a day — 180 hours a year.</p>
<p><span class="term">Automation</span> means letting the computer do this kind of repetitive, fixed-step work for you. You draw the steps once, and the computer executes them on time, every time, with zero mistakes.</p>
<p><b>n8n</b> (pronounced "n-eight-n") is a tool for drawing those flows. It is open source, which means you can <b>self-host it for free</b> on your own computer or server — no monthly fee. Similar tools like Zapier and Make charge per run; self-hosted n8n costs nothing.</p>

<h3>1.2 Three core concepts you must know</h3>
<table>
<tr><th>Concept</th><th>Plain-language meaning</th><th>Analogy</th></tr>
<tr><td><b>Node</b></td><td>One step in the flow, e.g. "read a Google Sheet" or "send an email"</td><td>A worker on an assembly line</td></tr>
<tr><td><b>Trigger</b></td><td>The starting point that decides <i>when</i> the flow runs — e.g. every day at 9am, or when a form is submitted</td><td>The factory bell</td></tr>
<tr><td><b>Execution</b></td><td>One complete run of the flow. You can inspect every step's input/output to debug</td><td>A production record sheet</td></tr>
</table>
<p>A complete <b>workflow</b> = 1 trigger + several nodes, connected by lines. Data flows left to right like water.</p>

<h3>1.3 Installing n8n (two free options)</h3>
<h4>Option 1: quickest taste (play with it today)</h4>
<p>Requires <a href="https://nodejs.org" target="_blank">Node.js</a> 18+. Open a terminal (PowerShell on Windows, Terminal on Mac) and run:</p>
<pre>npx n8n</pre>
<p>The first run downloads everything. When you see <code class="inline">Editor is now accessible via: http://localhost:5678</code>, open that URL in your browser, create a local account, and you'll see the n8n canvas.</p>
<h4>Option 2: Docker (recommended for long-term use)</h4>
<p><span class="term">Docker</span> is a "shipping container" for software — it packages n8n and everything it needs into one box that won't mess up your computer. Install Docker Desktop from docker.com, then run:</p>
<pre>docker volume create n8n_data
docker run -d --name n8n -p 5678:5678 -v n8n_data:/home/node/.n8n docker.n8n.io/n8nio/n8n</pre>
<ul>
<li><code class="inline">-d</code>: run in the background (survives closing the terminal)</li>
<li><code class="inline">--name n8n</code>: names the container for easy management</li>
<li><code class="inline">-p 5678:5678</code>: connects the container's port 5678 to your machine</li>
<li><code class="inline">-v n8n_data:...</code>: stores data in a volume so your workflows <b>survive restarts</b></li>
</ul>
<p>Stop with <code class="inline">docker stop n8n</code>, start again with <code class="inline">docker start n8n</code>.</p>
<div class="tip">💡 <b>Local vs cloud:</b> a local n8n only runs while your computer is on. In Lesson 7, when we need flows that run daily, we'll discuss putting n8n on a cheap VPS (~RM20/month) to run 24/7. Local is perfectly fine for now.</div>

<h3>1.4 Know the interface</h3>
<ul>
<li><b>Canvas</b>: the big empty area where your flow lives</li>
<li><b>➕ button</b>: add nodes — search hundreds of apps (Gmail, Sheets, Telegram, HTTP…)</li>
<li><b>Left sidebar</b>: Workflows, Credentials (saved account authorizations), Executions (run history)</li>
<li><b>Active switch (top right)</b>: only when ON does the workflow run automatically on its trigger; otherwise it's manual-test only</li>
</ul>
`},

body:{zh:`
<h3>2.1 今天要做什么</h3>
<p>我们做一条真正「有用」的流程：<b>每天早上 7 点，自动查槟城天气，如果会下雨就发 Telegram 提醒你带伞。</b>流程图长这样：</p>
<pre>Schedule Trigger ──▶ HTTP Request ──▶ IF（会下雨吗？）──▶ true: Telegram 发提醒
（每天 07:00）      （查天气 API）                      └▶ false: 什么都不做</pre>

<h3>2.2 Schedule Trigger：n8n 的闹钟</h3>
<p>添加 <b>Schedule Trigger</b> 节点，Trigger Interval 选 <b>Days</b>，Trigger at Hour 填 7。就这么简单——这个节点会在每天早上 7 点「敲响铃声」，把数据推给下一个节点。</p>
<div class="tip">💡 更复杂的时间（例如「每周一三五的 9:30」）可以选 <b>Custom (Cron)</b> 模式。Cron 是一种时间表达式，例如 <code class="inline">30 9 * * 1,3,5</code> 表示每周一三五 9:30。看不懂没关系，网上搜 "cron generator" 有免费生成器。</div>

<h3>2.3 HTTP Request：跟整个互联网要数据</h3>
<p>这是 n8n 最万能的节点。<span class="term">API</span>（应用程序接口）就是「网站给程序用的窗口」——你用一个网址去问，它用 <span class="term">JSON</span>（一种带格式的文本）回答。我们用免费无需注册的 Open-Meteo 天气 API：</p>
<p>添加 <b>HTTP Request</b> 节点，Method 保持 <b>GET</b>（GET = 我要拿数据），URL 填：</p>
<pre>https://api.open-meteo.com/v1/forecast?latitude=5.35&longitude=100.46&daily=precipitation_probability_max&timezone=Asia%2FKuala_Lumpur</pre>
<p>（latitude/longitude 是大山脚的坐标，你可以换成任何地点。）点 <b>Execute step</b> 测试，OUTPUT 会出现类似：</p>
<pre>{
  "daily": {
    "time": ["2026-07-06"],
    "precipitation_probability_max": [78]
  }
}</pre>
<p>意思是：今天最高降雨概率 78%。注意数据的「层级」：<code class="inline">daily</code> 里面有 <code class="inline">precipitation_probability_max</code>，它是一个数组（方括号），我们要取第 0 个（编程从 0 开始数）。</p>

<h3>2.4 IF 节点：让流程会「思考」</h3>
<p>添加 <b>IF</b> 节点。它像一个岔路口：条件成立走 true 出口，不成立走 false 出口。设置条件：</p>
<ul>
<li>左值（Value 1）：点输入框右边的齿轮选 <b>Expression</b>，填 <code class="inline">{{ $json.daily.precipitation_probability_max[0] }}</code></li>
<li>比较：<b>Number → is greater than</b></li>
<li>右值（Value 2）：<code class="inline">50</code></li>
</ul>
<p><span class="term">表达式 Expression</span> 是 n8n 的「取数语法」：双大括号里写 <code class="inline">$json.字段名</code> 就能取到上一个节点输出的数据。这是全 n8n 最重要的技能，第 3 课我们会专门深挖。</p>

<h3>2.5 Telegram：5 分钟拥有自己的机器人</h3>
<ol>
<li>在 Telegram 里搜 <b>@BotFather</b>（官方机器人管理员），发送 <code class="inline">/newbot</code>，按提示取名，你会得到一串 <b>Token</b>（机器人密码，别泄露）</li>
<li>搜你刚创建的机器人，给它发一句「hi」（必须先发过消息它才能回你）</li>
<li>浏览器打开 <code class="inline">https://api.telegram.org/bot你的Token/getUpdates</code>，在返回内容里找 <code class="inline">"chat":{"id":123456789</code>——这个数字就是你的 <b>Chat ID</b></li>
<li>回到 n8n：在 IF 节点的 <b>true</b> 出口接一个 <b>Telegram</b> 节点，Operation 选 Send Message，创建 Credential 填入 Token，Chat ID 填你的数字，Text 填：<code class="inline">☔ 今天降雨概率 {{ $json.daily.precipitation_probability_max[0] }}%，记得带伞！</code></li>
</ol>

<h3>2.6 上线！</h3>
<p>整条流程测试通过后，把右上角 <b>Active</b> 开关打开。从明天起，每天 7 点它就会自己跑。你刚刚完成了人生第一条全自动流程。</p>
`,
en:`
<h3>2.1 What we're building today</h3>
<p>A genuinely useful flow: <b>every morning at 7am, check the Penang weather; if rain is likely, send yourself a Telegram reminder to bring an umbrella.</b></p>
<pre>Schedule Trigger ──▶ HTTP Request ──▶ IF (will it rain?) ──▶ true: Telegram alert
(daily 07:00)        (weather API)                          └▶ false: do nothing</pre>

<h3>2.2 Schedule Trigger: n8n's alarm clock</h3>
<p>Add a <b>Schedule Trigger</b> node. Set Trigger Interval to <b>Days</b> and Trigger at Hour to 7. That's it — this node "rings the bell" at 7am daily and pushes data to the next node.</p>
<div class="tip">💡 For complex timing ("Mon/Wed/Fri at 9:30"), choose <b>Custom (Cron)</b>. Cron is a time expression: <code class="inline">30 9 * * 1,3,5</code> means Mon/Wed/Fri 9:30. Search "cron generator" for free helpers.</div>

<h3>2.3 HTTP Request: ask the entire internet for data</h3>
<p>The most versatile node in n8n. An <span class="term">API</span> is "a website's window for programs" — you ask via a URL, it answers in <span class="term">JSON</span> (structured text). We'll use the free, no-signup Open-Meteo weather API.</p>
<p>Add an <b>HTTP Request</b> node, keep Method as <b>GET</b> (GET = give me data), URL:</p>
<pre>https://api.open-meteo.com/v1/forecast?latitude=5.35&longitude=100.46&daily=precipitation_probability_max&timezone=Asia%2FKuala_Lumpur</pre>
<p>(Those coordinates are Bukit Mertajam — change them to anywhere.) Click <b>Execute step</b>; the OUTPUT will look like:</p>
<pre>{
  "daily": {
    "time": ["2026-07-06"],
    "precipitation_probability_max": [78]
  }
}</pre>
<p>Meaning: 78% max chance of rain today. Note the nesting: <code class="inline">precipitation_probability_max</code> lives inside <code class="inline">daily</code> and is an array (square brackets) — we want item 0 (programming counts from 0).</p>

<h3>2.4 The IF node: give your flow a brain</h3>
<p>Add an <b>IF</b> node — a fork in the road: condition true → true output, otherwise → false output. Configure:</p>
<ul>
<li>Value 1: switch to <b>Expression</b> and enter <code class="inline">{{ $json.daily.precipitation_probability_max[0] }}</code></li>
<li>Comparison: <b>Number → is greater than</b></li>
<li>Value 2: <code class="inline">50</code></li>
</ul>
<p>An <span class="term">Expression</span> is n8n's data-picking syntax: inside double curly braces, <code class="inline">$json.fieldName</code> reads the previous node's output. This is the single most important n8n skill — Lesson 3 goes deep on it.</p>

<h3>2.5 Telegram: your own bot in 5 minutes</h3>
<ol>
<li>In Telegram, find <b>@BotFather</b>, send <code class="inline">/newbot</code>, follow the prompts. You'll receive a <b>Token</b> (the bot's password — keep it secret)</li>
<li>Find your new bot and send it "hi" (it can only message you after you message it first)</li>
<li>Open <code class="inline">https://api.telegram.org/botYOUR_TOKEN/getUpdates</code> in a browser and find <code class="inline">"chat":{"id":123456789</code> — that number is your <b>Chat ID</b></li>
<li>Back in n8n: connect a <b>Telegram</b> node to the IF node's <b>true</b> output. Operation: Send Message. Create a credential with your Token, enter your Chat ID, Text: <code class="inline">☔ Rain probability today: {{ $json.daily.precipitation_probability_max[0] }}% — bring an umbrella!</code></li>
</ol>

<h3>2.6 Go live!</h3>
<p>Once the full flow tests OK, flip the <b>Active</b> switch (top right). From tomorrow, it runs itself at 7am. You've just shipped your first fully automatic workflow.</p>
`},

body:{zh:`
<h3>3.1 JSON：自动化世界的普通话</h3>
<p>所有节点之间传递的数据都是 JSON。它只有几种零件，10 分钟就能全部学会：</p>
<pre>{
  "name": "阿明",              ← 字符串（文字，用双引号）
  "age": 35,                   ← 数字（不用引号）
  "isVip": true,               ← 布尔值（true / false）
  "tags": ["常客", "槟城"],     ← 数组（一排东西，用方括号）
  "address": {                 ← 对象（套一层，用花括号）
    "city": "大山脚"
  }
}</pre>
<p>取值口诀：<b>对象用点，数组用方括号加序号（从 0 数起）</b>。例如取城市：<code class="inline">$json.address.city</code>；取第一个标签：<code class="inline">$json.tags[0]</code>。</p>

<h3>3.2 n8n 的秘密武器：items 自动循环</h3>
<p>这是初学者最容易懵、但一旦懂了就开窍的概念。n8n 节点之间传的不是「一份数据」，而是一个<b>清单（items）</b>。清单里有几条，下一个节点就<b>自动对每一条各跑一次</b>——你不需要写任何循环！</p>
<p>例如 Google Sheets 读出 50 行订单 = 50 个 items，接一个 Telegram 节点就会自动发 50 条消息。这就是为什么 n8n 处理批量数据特别爽。</p>
<div class="warn">⚠️ 反过来这也是新手最常见的翻车点：你以为只会发 1 条消息，结果客户收到 50 条。想「汇总成一条」时，要用 <b>Aggregate</b> 节点把多个 items 合并成 1 个，或在 Code 节点里合并。</div>

<h3>3.3 四大数据节点速查</h3>
<table>
<tr><th>节点</th><th>作用</th><th>典型场景</th></tr>
<tr><td><b>Edit Fields (Set)</b></td><td>新增/改名/删除字段，整理数据形状</td><td>把 API 返回的乱字段整理成 name、phone、amount 三个干净字段</td></tr>
<tr><td><b>IF</b></td><td>二选一分岔（true / false）</td><td>金额 > 1000 走「大客户」分支</td></tr>
<tr><td><b>Switch</b></td><td>多选一分岔（可以很多出口）</td><td>按 status 分：pending / paid / cancelled 三条路</td></tr>
<tr><td><b>Filter</b></td><td>过滤：只留下符合条件的 items</td><td>50 行订单只留「未处理」的 12 行</td></tr>
</table>

<h3>3.4 Code 节点：最后的万能钥匙</h3>
<p>95% 的情况用上面的节点就够了。剩下 5% 的奇怪需求（复杂计算、特殊格式转换），用 <b>Code</b> 节点写几行 JavaScript。它的固定套路是：<b>进来是 items，出去也必须是 items</b>：</p>
<pre>// 模式：Run Once for All Items
// 例：给每条订单加一个 10% 服务费字段
for (const item of $input.all()) {
  item.json.serviceFee = item.json.amount * 0.1;
  item.json.total = item.json.amount * 1.1;
}
return $input.all();</pre>
<pre>// 例：把多条 items 汇总成一条摘要
const items = $input.all();
let sum = 0;
for (const item of items) { sum += item.json.amount; }
return [{ json: { orderCount: items.length, totalAmount: sum } }];</pre>
<div class="tip">💡 <b>不会写代码怎么办？</b>把你的需求 + 输入数据的样子，直接贴给我（Claude），说「帮我写 n8n Code 节点」。这正是 AI 时代学自动化的正确姿势——你负责懂流程，AI 负责语法。</div>

<h3>3.5 表达式进阶三招</h3>
<ul>
<li><b>跨节点取数</b>：<code class="inline">{{ $('节点名字').item.json.字段 }}</code>——不止能取上一个节点，任何前面的节点都能取</li>
<li><b>日期</b>：<code class="inline">{{ $now.format('yyyy-MM-dd') }}</code> 得到今天日期，如 2026-07-06</li>
<li><b>兜底默认值</b>：<code class="inline">{{ $json.phone || '未提供' }}</code>——phone 是空的就显示「未提供」，防止消息里出现难看的 undefined</li>
</ul>
`,
en:`
<h3>3.1 JSON: the lingua franca of automation</h3>
<p>All data between nodes is JSON. It has only a few building blocks — learnable in 10 minutes:</p>
<pre>{
  "name": "Ah Ming",           ← string (text, in double quotes)
  "age": 35,                   ← number (no quotes)
  "isVip": true,               ← boolean (true / false)
  "tags": ["regular", "PG"],   ← array (a row of things, square brackets)
  "address": {                 ← object (a nested level, curly braces)
    "city": "Bukit Mertajam"
  }
}</pre>
<p>Reading rule: <b>dot for objects, [index] for arrays (count from 0)</b>. City: <code class="inline">$json.address.city</code>. First tag: <code class="inline">$json.tags[0]</code>.</p>

<h3>3.2 n8n's secret weapon: automatic looping over items</h3>
<p>The concept that confuses beginners most — and unlocks everything once it clicks. Nodes don't pass "one piece of data"; they pass a <b>list of items</b>. However many items arrive, the next node <b>runs once per item automatically</b> — you never write a loop!</p>
<p>Read 50 order rows from Google Sheets = 50 items; a Telegram node after it sends 50 messages automatically. This is why n8n is so pleasant for batch work.</p>
<div class="warn">⚠️ It's also the classic beginner trap: you expected 1 message, the client got 50. To summarize into ONE, use the <b>Aggregate</b> node to merge items, or merge inside a Code node.</div>

<h3>3.3 The four data nodes at a glance</h3>
<table>
<tr><th>Node</th><th>Purpose</th><th>Typical use</th></tr>
<tr><td><b>Edit Fields (Set)</b></td><td>Add/rename/remove fields; reshape data</td><td>Turn messy API fields into clean name, phone, amount</td></tr>
<tr><td><b>IF</b></td><td>Two-way fork (true / false)</td><td>amount > 1000 → "big client" branch</td></tr>
<tr><td><b>Switch</b></td><td>Multi-way fork (many outputs)</td><td>Route by status: pending / paid / cancelled</td></tr>
<tr><td><b>Filter</b></td><td>Keep only items matching a condition</td><td>From 50 orders keep the 12 "unprocessed"</td></tr>
</table>

<h3>3.4 The Code node: the master key</h3>
<p>The nodes above cover 95% of cases. For the odd 5% (complex math, unusual reformatting), the <b>Code</b> node runs JavaScript. Its fixed contract: <b>items in, items out</b>:</p>
<pre>// Mode: Run Once for All Items
// Example: add a 10% service fee to every order
for (const item of $input.all()) {
  item.json.serviceFee = item.json.amount * 0.1;
  item.json.total = item.json.amount * 1.1;
}
return $input.all();</pre>
<pre>// Example: collapse many items into one summary
const items = $input.all();
let sum = 0;
for (const item of items) { sum += item.json.amount; }
return [{ json: { orderCount: items.length, totalAmount: sum } }];</pre>
<div class="tip">💡 <b>Can't code?</b> Paste your requirement + a sample of the input data to me (Claude) and say "write me an n8n Code node". That's the correct way to learn automation in the AI era — you own the process, AI owns the syntax.</div>

<h3>3.5 Three advanced expression moves</h3>
<ul>
<li><b>Read any earlier node</b>: <code class="inline">{{ $('Node Name').item.json.field }}</code> — not just the previous one</li>
<li><b>Dates</b>: <code class="inline">{{ $now.format('yyyy-MM-dd') }}</code> → today, e.g. 2026-07-06</li>
<li><b>Fallback values</b>: <code class="inline">{{ $json.phone || 'not provided' }}</code> — avoids ugly undefined in messages</li>
</ul>
`},

body:{zh:`
<h3>4.1 Credential 与 OAuth：让 n8n 替你「刷脸」</h3>
<p>n8n 想读你的 Google Sheets，Google 当然要先确认「是你本人授权的」。<span class="term">OAuth</span> 就是这套授权机制：你在 Google 的页面上点一次「允许」，Google 发给 n8n 一把有限权限的钥匙。n8n 把钥匙存在 <b>Credentials</b> 里，以后所有工作流都能复用，<b>你的密码 n8n 从头到尾都不知道</b>——这就是它比「把密码告诉软件」安全的原因。</p>

<h3>4.2 一次性设置：Google Cloud 凭证（约 10 分钟）</h3>
<p>这是全课程最繁琐的一步，但只需做一次，跟着做即可：</p>
<ol>
<li>打开 <code class="inline">console.cloud.google.com</code>，用你的 Google 账号登录，新建一个项目（名字随意，如 my-n8n）</li>
<li>顶部搜索并 <b>Enable</b> 两个 API：<b>Google Sheets API</b> 和 <b>Gmail API</b></li>
<li>左侧菜单 → <b>APIs & Services → OAuth consent screen</b>：User type 选 External，填 App 名称和你的邮箱，一路 Save。在 <b>Test users</b> 里把你自己的 Gmail 加进去（重要！不加会报 403）</li>
<li>左侧 → <b>Credentials → Create Credentials → OAuth client ID</b>：类型选 <b>Web application</b></li>
<li>回到 n8n，新建一个 Google Sheets 的 Credential，界面上会显示一条 <b>OAuth Redirect URL</b>——复制它，贴回 Google 页面的 <b>Authorized redirect URIs</b>，保存后得到 <b>Client ID</b> 和 <b>Client Secret</b></li>
<li>把这两串贴进 n8n 的 Credential，点 <b>Sign in with Google</b>，弹窗里点允许。看到绿色 ✓ 就成功了</li>
</ol>
<div class="warn">⚠️ 常见报错：<b>redirect_uri_mismatch</b> = 第 5 步的 URL 没贴对（必须一字不差）；<b>403 access_denied</b> = 第 3 步忘了把自己加进 Test users。</div>

<h3>4.3 Google Sheets 三板斧</h3>
<p>先手动建一个表 <b>客户名单</b>，第一行写表头：<code class="inline">name | phone | source | date | status</code>。n8n 的 Sheets 节点常用三个 Operation：</p>
<table>
<tr><th>Operation</th><th>作用</th><th>要点</th></tr>
<tr><td><b>Append Row</b></td><td>在最底下加一行</td><td>开启 Map Each Column，把上游字段一一对进表头。记录新数据用它</td></tr>
<tr><td><b>Get Row(s)</b></td><td>读取数据</td><td>可加 Filter（如 status = pending），读出来每行就是一个 item</td></tr>
<tr><td><b>Update Row</b></td><td>改某一行</td><td>用「匹配列」定位行，例如按 phone 找到人，把 status 改成 done</td></tr>
</table>
<div class="tip">💡 <b>把 Google Sheets 当免费数据库</b>：小生意的客户表、订单表、库存表都可以先用 Sheets 扛着——老板看得懂、能手改、还免费。等量大了再升级到真数据库。</div>

<h3>4.4 Gmail 节点：会写信的机器人</h3>
<p>Gmail 的 Credential 步骤和 Sheets 一模一样（可以直接复用同一组 Client ID/Secret）。添加 <b>Gmail</b> 节点，Operation 选 <b>Send</b>：</p>

<pre>&lt;p&gt;亲爱的 {{ $json.name }}：&lt;/p&gt;
&lt;p&gt;感谢您的咨询！您选购的方案总额为 &lt;b&gt;RM {{ $json.amount }}&lt;/b&gt;。&lt;/p&gt;
&lt;p&gt;如有疑问请直接回复本邮件。&lt;/p&gt;

<p>注意：每个 item 发一封信（第 3 课学的自动循环），所以上游有 10 个客户就自动发 10 封个性化邮件——这已经是很多公司花钱买的「邮件营销」功能了。</p>

en:`
<h3>4.1 Credentials & OAuth: n8n "shows your face" for you</h3>
<p>For n8n to read your Google Sheet, Google must confirm you personally authorized it. <span class="term">OAuth</span> is that mechanism: you click "Allow" once on Google's own page, and Google hands n8n a limited-permission key. n8n stores the key under <b>Credentials</b>, reusable by every workflow — and <b>n8n never sees your password</b>. That's why it's safer than telling an app your password.</p>

<h3>4.2 One-time setup: Google Cloud credentials (~10 min)</h3>
<p>The most tedious step of the whole course — but you only do it once:</p>
<ol>
<li>Open <code class="inline">console.cloud.google.com</code>, sign in, create a project (any name, e.g. my-n8n)</li>
<li>Search and <b>Enable</b> two APIs: <b>Google Sheets API</b> and <b>Gmail API</b></li>
<li><b>APIs & Services → OAuth consent screen</b>: User type External, fill app name + your email, save through. Under <b>Test users</b> add your own Gmail (important — skipping this causes 403)</li>
<li><b>Credentials → Create Credentials → OAuth client ID</b>, type <b>Web application</b></li>
<li>In n8n, create a Google Sheets credential — it shows an <b>OAuth Redirect URL</b>. Copy it into Google's <b>Authorized redirect URIs</b>, save, and you receive a <b>Client ID</b> and <b>Client Secret</b></li>
<li>Paste both into n8n's credential, click <b>Sign in with Google</b>, allow in the popup. A green ✓ means success</li>
</ol>
<div class="warn">⚠️ Common errors: <b>redirect_uri_mismatch</b> = the URL in step 5 wasn't pasted exactly; <b>403 access_denied</b> = you forgot to add yourself as a Test user in step 3.</div>

<h3>4.3 The three Sheets moves</h3>
<p>Manually create a sheet <b>Leads</b> with headers: <code class="inline">name | phone | source | date | status</code>. The three everyday operations:</p>
<table>
<tr><th>Operation</th><th>Purpose</th><th>Key point</th></tr>
<tr><td><b>Append Row</b></td><td>Add a row at the bottom</td><td>Use Map Each Column to map upstream fields to headers. Use for logging new data</td></tr>
<tr><td><b>Get Row(s)</b></td><td>Read data</td><td>Supports filters (e.g. status = pending); each row becomes an item</td></tr>
<tr><td><b>Update Row</b></td><td>Edit a specific row</td><td>Locate by a matching column, e.g. find by phone, set status = done</td></tr>
</table>
<div class="tip">💡 <b>Sheets as a free database</b>: a small business's leads, orders and stock can live in Sheets first — the boss can read it, hand-edit it, and it's free. Upgrade to a real database only when volume demands it.</div>

<h3>4.4 The Gmail node: a robot that writes letters</h3>
<p>Gmail credentials work exactly like Sheets (you can reuse the same Client ID/Secret). Add a <b>Gmail</b> node, Operation <b>Send</b>:</p>
<ul>
<li><b>To</b>: <code class="inline">{{ $json.email }}</code> (recipient from upstream data)</li>
<li><b>Subject</b>: <code class="inline">Hi {{ $json.name }}, your quotation</code></li>
<li><b>Email Type</b> HTML for formatted bodies:</li>
</ul>
<pre>&lt;p&gt;Dear {{ $json.name }},&lt;/p&gt;
&lt;p&gt;Thanks for your enquiry! Your selected package totals &lt;b&gt;RM {{ $json.amount }}&lt;/b&gt;.&lt;/p&gt;
&lt;p&gt;Reply to this email with any questions.&lt;/p&gt;
&lt;p&gt;— AUDO Solutions · sent automatically at {{ $now.format('yyyy-MM-dd HH:mm') }}&lt;/p&gt;</pre>
<p>Remember Lesson 3: one email per item — 10 upstream customers means 10 personalized emails automatically. That's the "email marketing" feature companies pay for.</p>
`},

en:`
<h3>5.1 Webhooks: the phone call in reverse</h3>
<p>In Lesson 2 we <b>actively asked</b> for data with HTTP Request (I call the weather bureau). A <span class="term">webhook</span> is the reverse: <b>you hand out a private URL, and the moment something happens, the other side calls you</b>. The instant a customer submits a form or a shop gets an order, the data is pushed straight into n8n — no polling every minute, instant and cheap.</p>
<pre>Normal API:  n8n ──"any new data?"──▶ them     (Pull)
Webhook:     them ──"new data! here"──▶ n8n    (Push)</pre>

<h3>5.2 The Webhook node hands-on</h3>
<p>Add a <b>Webhook</b> node, Method POST, Path e.g. <code class="inline">new-lead</code>. It generates two URLs:</p>
<ul>
<li><b>Test URL</b> (contains /webhook-test/): listens once after you click "Listen for test event" — for development</li>
<li><b>Production URL</b> (contains /webhook/): listens 24/7 once the workflow is Active — the real one</li>
</ul>
<p>Click Listen, then simulate an external system with curl:</p>
<pre>curl -X POST http://localhost:5678/webhook-test/new-lead \
  -H "Content-Type: application/json" \
  -d '{"name":"Ah Hock","phone":"012-3456789","need":"POS system"}'</pre>
<p>n8n receives it instantly — then it's the world you already know: Set to clean → Sheets to log → Telegram to alert the boss.</p>
<div class="warn">⚠️ The internet can't reach localhost. During development use the official tunnel <code class="inline">npx n8n start --tunnel</code> for a temporary public URL; for production, host on a VPS (end of Lesson 7).</div>

<h3>5.3 Calling key-protected APIs: Claude as the example</h3>
<p>Powerful APIs need an <span class="term">API key</span> (a password representing your account + billing). Create one at <code class="inline">console.anthropic.com</code> (starts with sk-ant-). Call Claude via HTTP Request:</p>
<ul>
<li>Method: <b>POST</b> (we're submitting a question)</li>
<li>URL: <code class="inline">https://api.anthropic.com/v1/messages</code></li>
<li>Headers: <code class="inline">x-api-key</code> = your key, <code class="inline">anthropic-version</code> = 2023-06-01, <code class="inline">content-type</code> = application/json</li>
<li>Body (JSON):</li>
</ul>
<pre>{
  "model": "claude-sonnet-4-6",
  "max_tokens": 500,
  "messages": [
    { "role": "user",
      "content": "Summarize this enquiry in 50 words and rate urgency (high/med/low): {{ $json.need }}" }
  ]
}</pre>
<p>In the response, the AI's answer lives at <code class="inline">$json.content[0].text</code>. Your workflow now has a brain that reads, writes and judges.</p>
<div class="tip">💡 <b>Key hygiene:</b> never hard-code keys in nodes. Store them in n8n Credentials (HTTP Request supports Header Auth credentials) or environment variables. A leaked key = someone spends your money.</div>

<h3>5.4 Respond to Webhook: flows that talk back</h3>
<p>By default a webhook replies "OK" immediately. To return your processed result to the caller (e.g. a form page displaying the AI analysis), add a <b>Respond to Webhook</b> node at the end and set the Webhook node's Respond to <b>Using Respond to Webhook node</b>. Your n8n workflow has just become an API of its own — other systems can call it!</p>
`},

body:{zh:`
<h3>6.1 AI 节点 vs AI Agent：一次性员工 vs 自主员工</h3>
<p>第 5 课我们调用 Claude，是「一问一答」：你给输入，它给输出，路线完全由你画死。<span class="term">AI Agent（智能体）</span>不一样——你给它一个<b>目标</b>和一箱<b>工具</b>，它自己决定：要不要用工具？用哪个？用几次？直到完成目标。</p>
<pre>AI 节点：   输入 ──▶ AI ──▶ 输出          （路线固定，你是导演）
AI Agent：  目标 ──▶ AI ⇄ 工具箱 ──▶ 结果  （AI 自己决定怎么走）
                     ↑______循环______↓</pre>
<p>例子：用户问「上周销售冠军是谁？帮我发邮件恭喜他」。Agent 会自己：① 调「查询 Sheets」工具找数据 → ② 比较出冠军 → ③ 调「发邮件」工具。这三步不是你连线连出来的，是它<b>推理</b>出来的。</p>

<h3>6.2 搭建你的第一个 Agent</h3>
<p>在 n8n 添加 <b>AI Agent</b> 节点（在 AI 分类下），它像一个插座板，需要插上三样东西：</p>
<table>
<tr><th>插槽</th><th>插什么</th><th>说明</th></tr>
<tr><td><b>Chat Model</b></td><td>Anthropic Chat Model（填入你的 API Key，选 Claude Sonnet）</td><td>大脑。也可插 OpenAI、Gemini 等</td></tr>
<tr><td><b>Memory</b></td><td>Simple Memory</td><td>短期记忆，让它记得同一场对话里之前说过什么</td></tr>
<tr><td><b>Tools</b></td><td>Google Sheets Tool、HTTP Request Tool、Code Tool……可插多个</td><td>手脚。每个工具要写清楚 description（AI 靠描述决定用不用它）</td></tr>
</table>
<p>触发器用 <b>Chat Trigger</b>（On chat message），n8n 会给你一个内置聊天界面，直接就能和 Agent 对话测试。</p>

<h3>6.3 System Prompt：给员工写岗位说明书</h3>
<p>Agent 节点的 System Message 决定它的「人设与纪律」。一份靠谱的岗位说明书包含四块：</p>
<pre>你是 AUDO Solutions 的销售数据助理。

【职责】回答关于销售数据的问题；需要数据时使用"查询销售表"工具。

【规则】
1. 金额一律显示为 RM 格式，保留两位小数
2. 查不到数据就直说"查无记录"，禁止编造数字
3. 涉及删除或修改数据的请求，一律拒绝并提示联系管理员

【风格】简体中文，简洁友善，重点用列表呈现。

【工具说明】"查询销售表"：输入日期范围，返回订单记录。</pre>
<div class="warn">⚠️ <b>「禁止编造」必须白纸黑字写进去。</b>大语言模型的天性是「尽量给出答案」，没有约束时它可能一本正经地编数据。生产环境的 Agent 提示词，一半篇幅都在写「不能做什么」。</div>

<h3>6.4 什么时候不该用 Agent？</h3>
<p>Agent 很酷，但不是万能锤子：</p>
<ul>
<li><b>路线完全固定的任务</b>（每天读表→汇总→发报告）：用普通流程。更快、更便宜、100% 稳定</li>
<li><b>需要灵活应对的任务</b>（客服问答、数据查询助手、内容创作）：用 Agent</li>
<li><b>经验法则</b>：能画出确定流程图的，就别用 Agent。Agent 是拿「不确定性」换「灵活性」，每次循环都在烧 token（钱）</li>
</ul>
<div class="tip">💡 混合架构才是王道：普通流程做骨架（定时、取数、发送），中间嵌一个 Agent 节点做「需要动脑」的那一步。这正是第 7 课实战的做法。</div>
`,
en:`
<h3>6.1 AI step vs AI Agent: a one-task worker vs an autonomous one</h3>
<p>In Lesson 5, calling Claude was question-in, answer-out — the route was fixed by you. An <span class="term">AI Agent</span> is different: you give it a <b>goal</b> and a <b>toolbox</b>, and it decides for itself whether to use a tool, which one, and how many times, until the goal is done.</p>
<pre>AI step:   input ──▶ AI ──▶ output          (fixed route; you direct)
AI Agent:  goal ──▶ AI ⇄ toolbox ──▶ result (AI chooses the route)
                    ↑______loop______↓</pre>
<p>Example: "Who was last week's top seller? Email them congratulations." The agent will ① call the Sheets-query tool → ② compare and find the winner → ③ call the send-email tool. You didn't wire those steps — it <b>reasoned</b> them.</p>

<h3>6.2 Building your first agent</h3>
<p>Add the <b>AI Agent</b> node (AI category). It's a socket board needing three plugs:</p>
<table>
<tr><th>Socket</th><th>Plug in</th><th>Notes</th></tr>
<tr><td><b>Chat Model</b></td><td>Anthropic Chat Model (your API key, pick Claude Sonnet)</td><td>The brain. OpenAI, Gemini etc. also fit</td></tr>
<tr><td><b>Memory</b></td><td>Simple Memory</td><td>Short-term memory within one conversation</td></tr>
<tr><td><b>Tools</b></td><td>Google Sheets Tool, HTTP Request Tool, Code Tool… (multiple allowed)</td><td>The hands. Write a clear description per tool — the AI decides usage from descriptions</td></tr>
</table>
<p>Use the <b>Chat Trigger</b> (On chat message); n8n gives you a built-in chat UI to converse with your agent immediately.</p>

<h3>6.3 The system prompt: a job description for your AI employee</h3>
<p>The Agent node's System Message defines its persona and discipline. A solid one has four blocks:</p>
<pre>You are the sales-data assistant of AUDO Solutions.

[DUTY] Answer questions about sales data; use the "query sales sheet"
tool whenever data is needed.

[RULES]
1. Always format money as RM with 2 decimals
2. If no data is found, say "no records found" — NEVER invent numbers
3. Refuse any request to delete or modify data; direct to the admin

[STYLE] Concise, friendly, use lists for key points.

[TOOLS] "query sales sheet": input a date range, returns order records.</pre>
<div class="warn">⚠️ <b>"Never invent" must be written explicitly.</b> LLMs are wired to always produce an answer; unconstrained, they may fabricate confidently. In production agent prompts, half the text is about what NOT to do.</div>

<h3>6.4 When NOT to use an agent</h3>
<ul>
<li><b>Fully fixed routes</b> (daily read → summarize → send): plain workflow. Faster, cheaper, 100% deterministic</li>
<li><b>Flexible-response tasks</b> (support Q&A, data assistant, content creation): agent</li>
<li><b>Rule of thumb</b>: if you can draw the exact flowchart, don't use an agent. Agents trade determinism for flexibility, and every loop burns tokens (money)</li>
</ul>
<div class="tip">💡 Hybrid architecture wins: a plain flow as the skeleton (schedule, fetch, send) with one agent node embedded for the step that truly needs thinking. Exactly what we build in Lesson 7.</div>
`},

body:{zh:`
<h3>7.1 蓝图</h3>
<p>还记得那张海报吗？「自动整理 Excel Data → 自动生成 Report → 自动发送 Email」。今天你就把这条 RM3,000 的流水线亲手做出来：</p>

<h3>7.2 数据从哪来：Sheets 或 Excel 都行</h3>
<p><b>路线 A（推荐）</b>：数据在 Google Sheets——直接用第 4 课的 Get Rows。<br>
<b>路线 B</b>：数据是 .xlsx 文件——用 <b>Read/Write Files from Disk</b> 节点读取文件（本地安装才有权限），接 <b>Extract from File</b> 节点选 XLSX 格式，每行自动变成一个 item。CSV 同理选 CSV。</p>
<div class="tip">💡 客户给你的永远是乱七八糟的 Excel。接一个 Set 节点先把列名统一成英文无空格（如 Order Date → date），后面所有表达式都会好写十倍。</div>

<h3>7.3 关键决策：为什么先用 Code 汇总，而不是把整个 Excel 丢给 AI？</h3>
<p>三个理由，也是面试/接单时能讲出专业度的地方：</p>
<ul>
<li><b>省钱</b>：500 行原始数据可能是几万 token；汇总后只剩 200 token。API 按 token 计费</li>
<li><b>准确</b>：让 AI 心算 500 行的总和，偶尔会算错；用代码算，永远精确。<b>算术交给代码，语言交给 AI</b></li>
<li><b>稳定</b>：喂给 AI 的内容越干净，输出质量越稳定</li>
</ul>
<p>Code 节点示例（按上游字段名调整）：</p>
<pre>const items = $input.all();
let total = 0, best = { name: "-", amount: 0 };

}

  totalSales: total.toFixed(2),
  topCustomer: best.name,
  topAmount: best.amount.toFixed(2),

}}];</pre>

`,
en:`
<h3>7.1 The blueprint</h3>
<p>Remember the poster? "Auto-organize Excel → auto-generate report → auto-send email." Today you build that RM3,000 pipeline yourself:</p>
<pre>Schedule (Mondays 08:00)
  └▶ Read sales data (Sheets or Excel file)
      └▶ Code: aggregate stats (total / count / top / trend)
          └▶ Claude API: turn stats into a human-readable weekly report
              └▶ Gmail: to the boss  +  Telegram: to yourself</pre>

<h3>7.2 Where the data comes from: Sheets or Excel</h3>
<p><b>Route A (recommended)</b>: data in Google Sheets — Lesson 4's Get Rows.<br>
<b>Route B</b>: a .xlsx file — use <b>Read/Write Files from Disk</b> (local installs have file access) into <b>Extract from File</b> with XLSX format; each row becomes an item. Same for CSV.</p>
<div class="tip">💡 Client Excels are always messy. Add a Set node to normalize column names to clean English (Order Date → date) — every later expression becomes ten times easier.</div>

<h3>7.3 Key decision: why aggregate in Code first instead of dumping the whole Excel into AI?</h3>
<ul>
<li><b>Cost</b>: 500 raw rows may be tens of thousands of tokens; the aggregate is ~200. APIs bill by token</li>
<li><b>Accuracy</b>: asking AI to mentally sum 500 rows occasionally fails; code is always exact. <b>Arithmetic to code, language to AI</b></li>
<li><b>Stability</b>: the cleaner the input, the steadier the output quality</li>
</ul>
<pre>const items = $input.all();
let total = 0, best = { name: "-", amount: 0 };
const byProduct = {};
for (const it of items) {
  const amt = Number(it.json.amount) || 0;
  total += amt;
  if (amt > best.amount) best = { name: it.json.customer, amount: amt };
  byProduct[it.json.product] = (byProduct[it.json.product] || 0) + amt;
}
return [{ json: {
  weekOf: $now.format('yyyy-MM-dd'),
  orderCount: items.length,
  totalSales: total.toFixed(2),
  topCustomer: best.name,
  topAmount: best.amount.toFixed(2),
  byProduct: JSON.stringify(byProduct)
}}];</pre>

<h3>7.4 Have Claude write the report</h3>
<p>HTTP Request to Claude (Lesson 5 config), user content skeleton:</p>
<pre>You are a business analyst. Write a weekly sales report from the stats
below. Requirements: ① one-sentence summary first ② sections with
subheadings: Overall, Products, Star Customer, Next-Week Advice
③ professional but readable ④ use ONLY the given data, never invent
⑤ output HTML directly (p/h3/ul tags, no markdown).

Data:
Orders this week: {{ $json.orderCount }}
Total sales: RM {{ $json.totalSales }}
Top customer: {{ $json.topCustomer }} (RM {{ $json.topAmount }})
Sales by product: {{ $json.byProduct }}</pre>
<p>Demanding "HTML directly" lets the next step drop it straight into the email body.</p>

<h3>7.5 Send & deploy</h3>
<p>Gmail node: Subject <code class="inline">Weekly Sales Report · {{ $now.format('yyyy-MM-dd') }}</code>, HTML body <code class="inline">{{ $json.content[0].text }}</code>. Add a parallel Telegram node with a short version for yourself.</p>
<p><b>Deploy to the cloud (make it truly weekly-automatic):</b> rent the cheapest VPS (DigitalOcean/Vultr/local providers, ~USD 5/mo), install Docker, run Lesson 1's docker command, import your exported workflow JSON. Protect a remote n8n with auth via container environment variables.</p>
`},

body:{zh:`
<h3>8.1 毕业项目：客户询价全自动处理系统</h3>
<p>这是几乎每一家 SME 都愿意付钱的场景：客户在网站/FB 留了询价，店家常常几小时后才回——而<b>回复速度是成交率的第一杀手</b>。我们做的系统 5 秒内回复：</p>

只输出 JSON（不要任何其它文字、不要 markdown 代码块）：
{
 "category": "pos|website|automation|ads|other",

<p>接一个 Code 节点解析：<code class="inline">return [{ json: JSON.parse($input.first().json.content[0].text) }];</code>，之后 Switch 按 urgency 分流。</p>

<h3>8.4 兜底：Error Workflow</h3>
<p>生产系统必须回答一个问题：<b>流程半夜挂了怎么办？</b>n8n 的答案是 Error Workflow：</p>

en:`
<h3>8.1 Capstone: a fully automated enquiry-handling system</h3>
<p>Nearly every SME will pay for this: a customer enquires via website/FB and the shop replies hours later — yet <b>response speed is the #1 killer of conversion</b>. Our system replies within 5 seconds:</p>
<pre>Web form ──▶ Webhook ──▶ Claude analysis (intent/urgency/draft reply)
                              │
              ┌───────────────┴───────────────┐
        urgency = high                  urgency = med/low
              │                                │
   Telegram pings the boss NOW      Gmail sends the AI-drafted reply
              │                                │
              └────────▶ Sheets logs every one ◀────┘</pre>

<h3>8.2 The entrance: an enquiry form</h3>
<p>Ask me to generate a polished HTML enquiry form (name/phone/email/need) that POSTs to your n8n Production Webhook. Host it free on GitHub Pages — familiar territory for you. WhatsApp entrance (advanced): the official WhatsApp Business API needs Meta review and fees; prove the model with form + auto-email first, upgrade later.</p>

<h3>8.3 The brain: one call, three outputs</h3>
<p>Make Claude return structured JSON in a single call (the Lesson 5 lab trick) — cheap and easy to consume:</p>
<pre>You are AUDO Solutions' support analysis engine. Analyze the enquiry
below. Output ONLY JSON (no other text, no markdown fences):
{
 "category": "pos|website|automation|ads|other",
 "urgency": "high|medium|low",
 "summary": "summary within 30 words",
 "draftReply": "a professional, friendly reply draft that greets the
   customer by name, confirms the need, and promises a specialist
   follow-up within 1 working day. NO pricing, NO timeline promises."
}
Customer name: {{ $json.body.name }}
Enquiry: {{ $json.body.need }}</pre>
<p>Parse with a Code node: <code class="inline">return [{ json: JSON.parse($input.first().json.content[0].text) }];</code>, then Switch on urgency.</p>
<div class="warn">⚠️ <b>Three safety red lines for AI support</b> (write them into the prompt AND tell your client — this is your professionalism): ① AI handles first response only — no quotes, no commitments, no contracts; ② high urgency always escalates to a human; ③ every conversation is logged and auditable.</div>

<h3>8.4 The safety net: Error Workflow</h3>
<p>Production systems must answer: <b>what if it breaks at 3am?</b> n8n's answer:</p>
<ol>

</ol>
<p>Now any failed execution reaches your phone in 10 seconds — not three days later via an angry customer. Also enable Settings → <b>Retry on Fail</b> on fragile nodes (like the Claude call) so a network blip auto-retries.</p>

<h3>8.5 Graduation & the road ahead</h3>

en:`
<h3>1.1 Why are there three "Claudes"?</h3>
<p>Same AI brain, different bodies with different hands:</p>
<table>
<tr><th>Product</th><th>Body</th><th>Great at</th><th>One-liner</th></tr>
<tr><td><b>Claude web/app</b></td><td>A chat window</td><td>Q&A, writing, analysis, single-file artifacts</td><td>An on-call consultant</td></tr>
<tr><td><b>Claude Code</b></td><td>Your terminal</td><td>Reading/writing your project folders, running commands, editing code, tests, Git</td><td>An engineer living inside your computer</td></tr>
<tr><td><b>Claude Cowork</b></td><td>A desktop app</td><td>Non-programmer file work: organizing folders, batch document processing, sheets & decks</td><td>An admin assistant who can use a computer</td></tr>
</table>

<h3>1.2 The core distinction: chat vs agentic</h3>
<p><b>Chat (web)</b>: you say one thing, it replies once. It can't see your computer — you paste materials in and copy results out. You are the conveyor belt.</p>
<p><b>Agentic (Code / Cowork)</b>: you give a <b>goal</b>; it decomposes it into steps — read files → edit → run to verify → find errors → edit again → report. Nothing needs carrying by you. That autonomous loop is exactly Track A Lesson 6's agent concept — except now the toolbox is <b>your entire computer</b>.</p>
<div class="tip">💡 With your real project: before, editing foodme.html meant "paste code to the web → copy back → test yourself". With Claude Code it becomes one sentence: "fix the cart-quantity bug and verify it yourself" — it locates the file, finds the issue, edits, checks.</div>

<h3>1.3 Your tool-assignment map</h3>
<table>
<tr><th>Your scenario</th><th>Tool</th><th>Why</th></tr>
<tr><td>Copywriting, brainstorming, knowledge, single-page HTML</td><td>Web</td><td>Fast; no file system needed</td></tr>
<tr><td>Multi-file ongoing dev like FoodMe / MANI: debugging, refactoring</td><td>Claude Code</td><td>Direct folder access + Git for traceable changes</td></tr>
<tr><td>Organizing client folders, batch-editing 100 Word docs, consolidating quotes</td><td>Cowork</td><td>Batch file work without code</td></tr>
<tr><td>Fixed flows running unattended 24/7</td><td>n8n (Track A)</td><td>Schedules and always-on are its home turf</td></tr>
</table>
<p>The master rule: <b>ask with words → web; touch my files → Code/Cowork; run unattended on a schedule → n8n.</b></p>
`},

body:{zh:`
<h3>2.1 安装（10 分钟）</h3>
<p>前提：Node.js 18+（轨道 A 第 1 课装过就跳过）。终端运行：</p>

claude</pre>

<div class="warn">⚠️ Windows 用户建议在 <b>WSL</b>（Windows Subsystem for Linux）或 Git Bash 里运行体验最佳。安装遇到任何报错，直接把报错信息贴给我。</div>

<h3>2.2 第一次对话：先让它「读」，再让它「改」</h3>
<p>好习惯是先让它熟悉项目：</p>
<pre>&gt; 请阅读这个项目的主要文件，用中文总结：这个项目是做什么的？
  核心文件有哪些？代码结构上有什么明显问题？</pre>
<p>它会自己决定去读哪些文件（你会看到它逐个打开文件的过程），然后给你一份相当专业的「入职报告」。接着来一个小修改任务：</p>
<pre>&gt; 把页面上所有写死的 "RM" 货币符号改成从一个统一常量读取，
  方便以后支持多币种。改完告诉我改了哪些地方。</pre>

<h3>2.3 权限系统：它是助手，不是主人</h3>
<p>你会发现它每次要<b>写文件</b>或<b>跑命令</b>时都先弹出请求，等你按 Yes。这不是啰嗦，是安全设计——AI 再聪明也可能误解你的意图，改错文件、删错东西。三种批准方式：</p>
<ul>
<li><b>Yes</b>：只批准这一次</li>
<li><b>Yes, and don't ask again for ...</b>：本次会话内同类操作不再问（例如信任所有「编辑文件」）</li>
<li><b>No, and tell Claude what to do differently</b>：拒绝并纠正它的方向</li>
</ul>
<div class="tip">💡 新手期建议逐次批准，顺便观察它每一步在干什么——这本身就是最好的学习。熟练后再逐步放宽。<b>不要</b>一上来就用跳过所有确认的「yolo 模式」，等你学完第 9 课的 Git 安全网再说。</div>

<h3>2.4 必会斜杠命令</h3>
<table>
<tr><th>命令</th><th>作用</th></tr>
<tr><td><code class="inline">/help</code></td><td>看全部命令</td></tr>
<tr><td><code class="inline">/clear</code></td><td>清空对话上下文。换一个不相关的新任务时用，省 token 又防串味</td></tr>

<h3>2.5 提需求的三个黄金习惯</h3>
<ul>
<li><b>给验收标准</b>：不说「优化一下」，说「把首屏加载时间的明显瓶颈找出来并修复，改完解释你做了什么」</li>

<li><b>让它自我验证</b>：结尾加一句「改完自己检查一遍是否有语法错误/遗漏」</li>

en:`
<h3>2.1 Install (10 minutes)</h3>
<p>Requires Node.js 18+ (skip if done in Track A Lesson 1). In a terminal:</p>
<pre>npm install -g @anthropic-ai/claude-code</pre>
<p>Then <b>cd into your project folder</b> (important — its "field of view" is the current folder), and launch:</p>
<pre>cd ~/projects/foodme
claude</pre>
<p>First launch asks you to log in: a Claude subscription (Pro/Max) or an API key. Seeing the input box = success.</p>
<div class="warn">⚠️ Windows users: best experience inside <b>WSL</b> or Git Bash. Any install error — paste it to me.</div>

<h3>2.2 First conversation: make it READ before it WRITES</h3>
<p>Good habit — orientation first:</p>
<pre>&gt; Read this project's main files and summarize: what does it do?
  What are the core files? Any obvious structural problems?</pre>
<p>It decides which files to open (you'll watch it do so) and delivers a rather professional "onboarding report". Then a small edit task:</p>
<pre>&gt; Replace every hard-coded "RM" currency symbol with a single
  shared constant so we can support multi-currency later.
  Tell me everywhere you changed.</pre>

<h3>2.3 Permissions: it's an assistant, not the owner</h3>
<p>It asks before every <b>file write</b> or <b>command run</b>. That's not nagging — it's safety design: even a smart AI can misread intent. Three responses:</p>
<ul>
<li><b>Yes</b>: approve this once</li>
<li><b>Yes, and don't ask again for ...</b>: trust this operation type for the session</li>
<li><b>No, and tell Claude what to do differently</b>: reject and redirect</li>
</ul>
<div class="tip">💡 As a beginner, approve one-by-one and watch what each step does — that IS the learning. Loosen gradually later. Do <b>not</b> start with the skip-all-confirmations "yolo mode" until you've built the Git safety net in Lesson 9.</div>

<h3>2.4 Essential slash commands</h3>
<table>
<tr><th>Command</th><th>Purpose</th></tr>
<tr><td><code class="inline">/help</code></td><td>List all commands</td></tr>
<tr><td><code class="inline">/clear</code></td><td>Wipe context. Use between unrelated tasks — saves tokens, prevents cross-contamination</td></tr>
<tr><td><code class="inline">/compact</code></td><td>Compress a long conversation into a summary and continue</td></tr>
<tr><td><code class="inline">/init</code></td><td>Scan the project and auto-generate CLAUDE.md (Lesson 3's star)</td></tr>
<tr><td><code class="inline">/cost</code></td><td>Session spend (API-billed users)</td></tr>
<tr><td><b>Esc</b></td><td>Interrupt anytime. Wrong direction? Press immediately, don't wait</td></tr>
</table>

<h3>2.5 Three golden prompting habits</h3>
<ul>
<li><b>Give acceptance criteria</b>: not "optimize it" but "find and fix the main first-load bottleneck, then explain what you did"</li>
<li><b>Plan first</b>: for complex tasks say "don't touch anything yet — list your plan for my approval". Approving a correct plan saves massive rework</li>
<li><b>Demand self-verification</b>: end with "after editing, check your own work for syntax errors and omissions"</li>
</ul>
`},

title:{zh:"CLAUDE.md 项目记忆：把你的规矩写进它的脑子", en:"CLAUDE.md Project Memory: Write Your Rules into Its Brain"},

body:{zh:`
<h3>3.1 问题：它每次都失忆</h3>
<p>第 2 课你可能已经发现：新开一次会话，它就忘了你项目的规矩——又要重新交代「用中文注释」「别动 config 文件」。<b>CLAUDE.md</b> 就是解药：放在项目根目录的一份说明书，<b>每次启动自动读入</b>，相当于给这位工程师的永久性入职手册。</p>

<h3>3.2 三层记忆，就近优先</h3>
<table>
<tr><th>层级</th><th>位置</th><th>写什么</th></tr>
<tr><td><b>全局</b>（你个人）</td><td><code class="inline">~/.claude/CLAUDE.md</code></td><td>跨项目的个人偏好：「回复用简体中文」「解释要简洁」</td></tr>
<tr><td><b>项目</b></td><td>项目根目录 <code class="inline">CLAUDE.md</code></td><td>本项目的技术栈、结构、规范、禁区。<b>随 Git 提交，全组共享</b></td></tr>
<tr><td><b>子目录</b></td><td>如 <code class="inline">functions/CLAUDE.md</code></td><td>某个子模块的特殊规矩，处理到该目录的文件时才加载</td></tr>
</table>
<p>冲突时越具体的越优先：子目录 > 项目 > 全局。</p>

<h3>3.3 一份好 CLAUDE.md 长什么样（FoodMe 实例）</h3>
<pre># FoodMe 项目指南

## 项目概况
马来西亚小贩档口的云端 POS + QR 点餐 SaaS。
单文件架构：foodme.html（商家端）、foodme-admin.html（管理端）。
后端：Firebase（项目 foodme-ac855），Firestore + Auth。
三语支持：zh / en / ms，所有 UI 文案必须三语齐全。

## 铁律（必须遵守）
- 保持单文件架构，不要拆分文件、不要引入构建工具
- 不使用外部图片链接，图标一律用内嵌 SVG
- 禁止修改 Firestore security rules，除非我明确要求
- 金额一律两位小数，货币符号 RM
- 新增 UI 文案必须同时提供 zh/en/ms 三个版本

## 代码风格
- 原生 JS，不引入框架；注释用简体中文
- 函数命名 camelCase；Firestore 集合名用复数小写

## 常用命令
- 本地预览：python3 -m http.server 8000
- 部署：git push（GitHub Pages 自动发布）

## 已知地雷
- renderOrders 曾有变量遮蔽 bug，改动订单渲染时务必回归测试
- 菜单 option-groups 有 set/additive 两种计价模式，别混淆</pre>
<p>注意它的特点：<b>短、具体、多用禁令</b>。「已知地雷」一节尤其值钱——那是你踩过的坑，写进去它就不会再踩。</p>

<h3>3.4 两个高效技巧</h3>
<ul>
<li><b>/init 起步</b>：在老项目里跑 <code class="inline">/init</code>，它会扫描项目自动生成一份初稿，你再人工修剪——比从零写快得多</li>
<li><b># 随手沉淀</b>：对话中发现它犯了一个你不想再看到的错误，输入 <code class="inline">#</code> 开头的一句话（例如 <code class="inline"># 以后所有日期格式统一用 yyyy-MM-dd</code>），它会把这条规矩存进记忆文件。<b>好的 CLAUDE.md 不是一次写成的，是这样一条条长出来的</b></li>
</ul>
<div class="warn">⚠️ 别把 CLAUDE.md 写成论文。它每次会话都占用上下文空间，只留「不写它就会做错」的内容。超过 100 行就该做减法了。</div>
`,
en:`
<h3>3.1 The problem: amnesia every session</h3>
<p>You've likely noticed in Lesson 2: each new session forgets your project's rules — you re-explain "comment in Chinese", "don't touch config". <b>CLAUDE.md</b> is the cure: a manual at the project root, <b>auto-loaded on every launch</b> — the engineer's permanent onboarding handbook.</p>

<h3>3.2 Three memory levels, most-specific wins</h3>
<table>
<tr><th>Level</th><th>Location</th><th>Contents</th></tr>
<tr><td><b>Global</b> (personal)</td><td><code class="inline">~/.claude/CLAUDE.md</code></td><td>Cross-project preferences: "reply in Chinese", "keep explanations brief"</td></tr>
<tr><td><b>Project</b></td><td><code class="inline">CLAUDE.md</code> at project root</td><td>Stack, structure, conventions, no-go zones. <b>Committed to Git, shared by the team</b></td></tr>
<tr><td><b>Subdirectory</b></td><td>e.g. <code class="inline">functions/CLAUDE.md</code></td><td>Module-specific rules, loaded when working on files there</td></tr>
</table>
<p>On conflict, the more specific wins: subdirectory > project > global.</p>

<h3>3.3 What a good CLAUDE.md looks like (FoodMe example)</h3>
<pre># FoodMe Project Guide

## Overview
Cloud POS + QR ordering SaaS for Malaysian hawker stalls.
Single-file architecture: foodme.html (merchant), foodme-admin.html (admin).
Backend: Firebase (project foodme-ac855), Firestore + Auth.
Trilingual: zh / en / ms — every UI string must exist in all three.

## Hard rules
- Keep the single-file architecture; no splitting, no build tools
- No external image URLs; icons are inline SVG only
- Never modify Firestore security rules unless explicitly asked
- Money always 2 decimals, currency symbol RM
- New UI copy must ship with zh/en/ms versions together

## Code style
- Vanilla JS, no frameworks; comments in Simplified Chinese
- camelCase functions; Firestore collections plural lowercase

## Common commands
- Local preview: python3 -m http.server 8000
- Deploy: git push (GitHub Pages auto-publishes)

## Known landmines
- renderOrders once had a variable-shadowing bug; regression-test
  any change to order rendering
- Menu option-groups have set/additive pricing modes — never confuse them</pre>
<p>Its traits: <b>short, concrete, heavy on prohibitions</b>. The "known landmines" section is gold — potholes you've hit, written down so it never hits them again.</p>

<h3>3.4 Two power techniques</h3>
<ul>
<li><b>Bootstrap with /init</b>: in an existing project, run <code class="inline">/init</code> for an auto-generated draft, then prune by hand — far faster than starting blank</li>
<li><b>Capture with #</b>: mid-conversation, when it makes a mistake you never want repeated, type a line starting with <code class="inline">#</code> (e.g. <code class="inline"># all dates use yyyy-MM-dd from now on</code>) and it saves the rule to memory. <b>A great CLAUDE.md isn't written once — it grows rule by rule this way</b></li>
</ul>
<div class="warn">⚠️ Don't write an essay. CLAUDE.md consumes context every session — keep only what it would get wrong without. Past ~100 lines, start cutting.</div>
`},

id:"b4", track:"cc", num:4, minutes:50,
title:{zh:"Skills 技能包：把你的专业知识做成 AI 的「秘籍」", en:"Skills: Package Your Expertise into AI 'Playbooks'"},
objectives:{
 zh:["理解 Skill 是什么、和 CLAUDE.md 的分工差别","看懂 SKILL.md 的结构：frontmatter + 正文 + 附件","亲手写一个真实技能（用你的姓名学体系当例子）","理解「渐进式加载」为什么让 Skill 又强又省"],
 en:["Understand what a Skill is vs what CLAUDE.md is for","Read the SKILL.md anatomy: frontmatter + body + resources","Hand-write a real skill (using your naming-analysis system as the example)","Understand why progressive disclosure makes skills powerful AND cheap"]
},
body:{zh:`
<h3>4.1 Skill 是什么？</h3>
<p>CLAUDE.md 是「本项目的规矩」，每次全文加载。<span class="term">Skill（技能）</span>则是「某项专业能力的完整操作手册」——一个文件夹，里面有一份 <code class="inline">SKILL.md</code> 和可选的附件（参考资料、脚本、模板）。它<b>平时不加载</b>，只在任务匹配时才被翻开。你可以理解为：CLAUDE.md 是贴在墙上的厂规，Skills 是书架上的一排专业秘籍，需要哪本抽哪本。</p>
<p>技能放在 <code class="inline">.claude/skills/技能名/SKILL.md</code>（项目级）或 <code class="inline">~/.claude/skills/</code>（个人级，跨项目可用）。</p>

<h3>4.2 SKILL.md 的解剖</h3>
<pre>---
name: shuyi-naming
description: 生肖姓名学分析。当用户要求分析中文姓名吉凶、
  为宝宝取名、或检查名字与生肖的配合度时使用本技能。
---

# 生肖姓名学分析流程

## 第一步：确定生肖
以立春为分界。1 月出生者需确认是否已过立春。

## 第二步：五得检测
逐项检查 得食/得地/得位/得势/得福：
- 得食：草食生肖宜禾米豆麦艹字根；肉食宜心忄月……
（此处写入你的完整规则）

## 第三步：地支合冲害刑
六冲：子午、丑未、寅申、卯酉、辰戌、巳亥……

## 输出格式
按「总评 → 逐字分析 → 五得清单 → 建议」四段输出。
详细字根对照表见 zigen-table.md。</pre>
<p>三个部件的分工：</p>
<ul>
<li><b>frontmatter（两条横线之间）</b>：name + description。<b>description 是灵魂</b>——AI 平时只读这一句，靠它判断「现在该不该抽出这本秘籍」。务必写清楚触发场景</li>
<li><b>正文</b>：完整的操作流程、规则、输出格式</li>
<li><b>附件</b>：同文件夹放 <code class="inline">zigen-table.md</code>（1600 字根表）、模板等，正文里引用，AI 需要时才去读</li>
</ul>

<h3>4.3 渐进式加载：为什么这样设计？</h3>
<p>你可能想问：直接把 1600 字的字根表塞进 CLAUDE.md 不行吗?不行——那会<b>每次会话</b>都吃掉巨量上下文，哪怕你只是想改个按钮颜色。Skill 的三级加载完美解决：</p>
<pre>平时         → 只装载 description 一句话（几乎零成本）
任务匹配时    → 读入 SKILL.md 正文（中等成本）
需要细节时    → 才去翻附件字根表（按需成本）</pre>
<p>这个「需要多少拿多少」的思想，叫<span class="term">渐进式加载（progressive disclosure）</span>，也是 CCA-F 认证考试的考点之一。</p>

<h3>4.4 什么知识值得做成 Skill？</h3>
<ul>
<li><b>有固定流程的专业判断</b>：你的姓名学分析、五格计算、报价单生成规范</li>
<li><b>公司标准</b>：AUDO 的品牌用色/文案风格/文档模板 → 做成 audo-brand 技能，以后所有产出自动合规</li>
<li><b>重复性生成任务</b>：「按我的格式写 FB 广告」「按我的结构出周报」</li>
<li>判断标准：这段话你是不是已经跟 AI 重复交代过 3 次以上？是 → 做成 Skill</li>
</ul>
`,
en:`
<h3>4.1 What is a Skill?</h3>
<p>CLAUDE.md is "this project's rules", fully loaded every time. A <span class="term">Skill</span> is "a complete playbook for one professional capability" — a folder holding a <code class="inline">SKILL.md</code> plus optional resources (references, scripts, templates). It stays <b>unloaded</b> until a matching task opens it. Think: CLAUDE.md is the factory rules on the wall; Skills are a shelf of specialist manuals, pulled down only when needed.</p>
<p>Skills live at <code class="inline">.claude/skills/skill-name/SKILL.md</code> (project) or <code class="inline">~/.claude/skills/</code> (personal, cross-project).</p>

<h3>4.2 Anatomy of SKILL.md</h3>
<pre>---
name: shuyi-naming
description: Chinese zodiac naming analysis. Use when the user asks
  to analyze a Chinese name, name a baby, or check name-zodiac
  compatibility.
---

# Zodiac Naming Analysis Procedure

## Step 1: Determine the zodiac
Boundary is LiChun (start of spring). January births must be checked.

## Step 2: The Five Blessings check
Check each of 得食/得地/得位/得势/得福:
- 得食: herbivore zodiacs favor 禾米豆麦艹 radicals; carnivores 心忄月…
(your full rules here)

## Step 3: Branch clashes and harms
Six clashes: 子午, 丑未, 寅申, 卯酉, 辰戌, 巳亥…

## Output format
Four sections: verdict → per-character analysis → blessings checklist
→ recommendations. Full radical tables: see zigen-table.md.</pre>
<ul>
<li><b>Frontmatter (between the dashes)</b>: name + description. <b>The description is the soul</b> — normally the AI reads only this line to decide whether to pull this manual. Spell out the trigger scenarios</li>
<li><b>Body</b>: the full procedure, rules, output format</li>
<li><b>Resources</b>: put <code class="inline">zigen-table.md</code> (the 1,600-radical table) etc. in the same folder; the body references them; the AI reads them only when needed</li>
</ul>

<h3>4.3 Progressive disclosure: why this design?</h3>
<p>Why not stuff the 1,600-entry radical table into CLAUDE.md? Because that would devour context <b>every session</b> — even when you're just recoloring a button. The skill's 3-level loading solves it:</p>
<pre>Normally          → only the description line loads (near-zero cost)
On task match     → SKILL.md body loads (medium cost)
When detail needed → resources are opened (on-demand cost)</pre>
<p>This take-only-what-you-need idea is called <span class="term">progressive disclosure</span> — also a CCA-F exam topic.</p>

<h3>4.4 What knowledge deserves to become a Skill?</h3>
<ul>
<li><b>Fixed-procedure professional judgment</b>: your naming analysis, five-grid calculation, quotation standards</li>
<li><b>Company standards</b>: AUDO's brand colors / copy voice / document templates → an audo-brand skill makes all output compliant automatically</li>
<li><b>Repetitive generation</b>: "FB ads in my format", "weekly reports in my structure"</li>
<li>The test: have you explained this to AI 3+ times already? Yes → make it a Skill</li>
</ul>
`},

body:{zh:`
<h3>5.1 MCP 解决什么问题？</h3>
<p>Claude Code 天生只会操作「你电脑里的文件和命令」。但真实工作还涉及外部系统：Firebase 数据库、Notion 笔记、GitHub、公司 CRM……以前每接一个系统都要写一套专属胶水代码。<span class="term">MCP（Model Context Protocol）</span>是 Anthropic 发起的开放标准，把这件事统一了——<b>像 USB 接口一样</b>：任何系统只要做了 MCP 服务器（插头），任何支持 MCP 的 AI（插座）就能直接用它。</p>
<pre>没有 MCP：AI ══专线1══ Notion   AI ══专线2══ GitHub   （每条专线单独开发）
有了 MCP：AI ──标准USB口──▶ [Notion插头] [GitHub插头] [Firebase插头] …</pre>
<p>轨道 A 第 6 课 n8n Agent 的「工具」概念在这里完全适用：MCP 就是给 Claude 的标准化工具箱。</p>

<h3>5.2 添加 MCP 服务器</h3>
<p>命令行一句话添加。例如接入 GitHub 官方 MCP（远程型，用 HTTP）：</p>
<pre>claude mcp add --transport http github https://api.githubcopilot.com/mcp/</pre>
<p>或者本地型（在你电脑上跑一个小程序做插头），例如文件系统 MCP：</p>
<pre>claude mcp add filesystem -- npx -y @modelcontextprotocol/server-filesystem ~/Documents</pre>
<p>管理命令：<code class="inline">claude mcp list</code> 看已接入的、<code class="inline">claude mcp remove 名字</code> 移除、会话内用 <code class="inline">/mcp</code> 查看状态和登录授权（很多服务器用 OAuth，第一次会弹浏览器让你授权，和轨道 A 第 4 课的 Google 授权同一套逻辑）。</p>
<p>接好之后不需要任何特殊语法——直接说人话：「把这个 bug 开成 GitHub issue，标签 bug，指给我自己」，它会自己挑对工具。</p>

<h3>5.3 MCP 服务器提供什么？</h3>
<table>
<tr><th>提供物</th><th>是什么</th><th>例子</th></tr>
<tr><td><b>Tools 工具</b></td><td>AI 可以调用的动作</td><td>create_issue、query_database、send_message</td></tr>
<tr><td><b>Resources 资源</b></td><td>AI 可以读取的数据源</td><td>某个文档、某张表、某个 API 的实时数据</td></tr>
<tr><td><b>Prompts 提示模板</b></td><td>服务器预置的常用指令</td><td>「生成本周迭代报告」一键模板</td></tr>
</table>

<h3>5.4 安全：接插头之前先看三眼</h3>
<div class="warn">⚠️ MCP 服务器 = 你授权一段别人写的程序替 AI 干活。接入前三查：<b>①来源</b>——官方出品（如 GitHub 官方 MCP）或知名开源项目才用，来路不明的一律不接；<b>②权限</b>——它要读还是要写？范围多大？文件系统类只开放特定文件夹（像上面例子只开放 ~/Documents）；<b>③提示注入风险</b>——AI 读到的外部内容（网页、issue、邮件）里可能藏着恶意指令。重要环境里，涉及「写操作」的工具保持人工确认，不要全自动放行。</div>

<h3>5.5 对你最有价值的几个方向</h3>
<ul>
<li><b>GitHub MCP</b>：FoodMe/MANI 的 issue、PR、代码搜索全部对话式操作</li>
<li><b>Firebase / 数据库类 MCP</b>：让 Claude 直接查 Firestore 数据帮你排错（先在测试项目练！）</li>
<li><b>Notion / Google Drive MCP</b>：读写你的知识库和客户文档</li>
<li><b>自己写 MCP 服务器</b>（进阶）：把你的数易命盘计算引擎包成 MCP，任何 AI 客户端都能调用你的命盘分析——这是把专业知识产品化的新通道</li>
</ul>
`,
en:`
<h3>5.1 What problem does MCP solve?</h3>
<p>Out of the box, Claude Code only touches files and commands on your machine. Real work involves external systems: Firebase, Notion, GitHub, a company CRM… Historically each connection needed bespoke glue code. <span class="term">MCP (Model Context Protocol)</span> is an open standard started by Anthropic that unifies this — <b>like USB</b>: any system that ships an MCP server (plug) works with any MCP-capable AI (socket).</p>
<pre>Without MCP: AI ══wire1══ Notion   AI ══wire2══ GitHub   (each wire custom-built)
With MCP:    AI ──standard port──▶ [Notion plug] [GitHub plug] [Firebase plug] …</pre>
<p>Track A Lesson 6's "tools" concept applies directly: MCP is Claude's standardized toolbox.</p>

<h3>5.2 Adding MCP servers</h3>
<p>One command. A remote (HTTP) server, e.g. GitHub's official MCP:</p>
<pre>claude mcp add --transport http github https://api.githubcopilot.com/mcp/</pre>
<p>Or a local one (a small program running on your machine as the plug), e.g. filesystem:</p>
<pre>claude mcp add filesystem -- npx -y @modelcontextprotocol/server-filesystem ~/Documents</pre>
<p>Management: <code class="inline">claude mcp list</code>, <code class="inline">claude mcp remove name</code>, and in-session <code class="inline">/mcp</code> for status and OAuth login (many servers pop a browser to authorize — same logic as Track A Lesson 4's Google OAuth).</p>
<p>Once connected, no special syntax — plain language: "open a GitHub issue for this bug, label it bug, assign me" — it picks the right tool itself.</p>

<h3>5.3 What a server offers</h3>
<table>
<tr><th>Offering</th><th>What it is</th><th>Examples</th></tr>
<tr><td><b>Tools</b></td><td>Actions the AI can invoke</td><td>create_issue, query_database, send_message</td></tr>
<tr><td><b>Resources</b></td><td>Data sources the AI can read</td><td>a document, a table, live API data</td></tr>
<tr><td><b>Prompts</b></td><td>Server-provided command templates</td><td>a one-click "weekly sprint report"</td></tr>
</table>

<h3>5.4 Security: three checks before plugging in</h3>
<div class="warn">⚠️ An MCP server = someone else's program you authorize to act for the AI. Before connecting: <b>① Source</b> — official (like GitHub's own MCP) or reputable open source only; never connect unknown plugs; <b>② Permissions</b> — read or write? How wide? Filesystem servers should expose only specific folders (like ~/Documents above); <b>③ Prompt injection</b> — external content the AI reads (webpages, issues, emails) can hide malicious instructions. In important environments, keep human confirmation on write-capable tools; don't fully auto-approve.</div>

<h3>5.5 The highest-value directions for you</h3>
<ul>
<li><b>GitHub MCP</b>: FoodMe/MANI issues, PRs and code search, all conversational</li>
<li><b>Firebase / database MCPs</b>: let Claude query Firestore to help debug (practice on a test project first!)</li>
<li><b>Notion / Google Drive MCP</b>: read/write your knowledge base and client docs</li>
<li><b>Write your own MCP server</b> (advanced): wrap your numerology chart engine as MCP so any AI client can call your analysis — a new channel for productizing expertise</li>
</ul>
`},

id:"b6", track:"cc", num:6, minutes:45,
title:{zh:"自动化与排程：无头模式、Hooks 与定时任务", en:"Automation & Scheduling: Headless Mode, Hooks & Cron"},
objectives:{
 zh:["会用无头模式 claude -p 把 AI 变成可编排的命令","理解 Hooks：在 AI 动作前后自动执行你的脚本","组合 cron + claude -p 做每日自动任务","分清什么该给 n8n、什么该给 Claude Code 定时跑"],
 en:["Use headless mode (claude -p) to turn AI into a scriptable command","Understand hooks: run your scripts automatically around AI actions","Combine cron + claude -p for daily automated jobs","Decide what belongs to n8n vs scheduled Claude Code"]
},
body:{zh:`
<h3>6.1 无头模式：AI 变成一条命令</h3>
<p>之前我们都是「进去聊天」。加上 <code class="inline">-p</code>（print）参数，Claude Code 变成<b>不聊天、执行完直接输出结果就退出</b>的命令——像 ls、grep 一样可以被脚本调用、被管道串联、被定时器触发：</p>
<pre># 单发一个任务，拿到结果就走
claude -p "检查 src 目录里所有 TODO 注释，整理成清单输出"

# 管道：把别的命令的输出喂给它
cat error.log | claude -p "分析这份错误日志，找出最可能的根因"

# 要机器可读的结构化结果
claude -p "统计本项目代码行数按文件类型分类" --output-format json</pre>
<p>这一步的意义重大：AI 从「一个聊天对象」变成了「一个可以被编排的零件」。任何能跑命令的地方——脚本、定时器、CI/CD、甚至 n8n 的 Execute Command 节点——都能嵌入一段 AI 智能。</p>

<h3>6.2 Hooks：在关键时刻自动插一脚</h3>
<p><span class="term">Hook（钩子）</span>是「当 AI 做某类动作时，自动运行我指定的命令」。它和 CLAUDE.md 的区别:CLAUDE.md 是<b>请求</b>（AI 尽量遵守），Hook 是<b>强制</b>（到点必然执行）。配置在 <code class="inline">.claude/settings.json</code>：</p>
<pre>{
  "hooks": {
    "PostToolUse": [{
      "matcher": "Edit|Write",
      "hooks": [{ "type": "command",
                  "command": "npx prettier --write \"$CLAUDE_FILE_PATHS\"" }]
    }]
  }
}</pre>
<p>上面这条的意思：<b>每当</b> AI 编辑或写入文件之后（PostToolUse + Edit|Write），自动跑 prettier 把该文件格式化。常用钩子时机：</p>
<table>
<tr><th>时机</th><th>触发点</th><th>典型用途</th></tr>
<tr><td><b>PreToolUse</b></td><td>动作执行前（可拦截）</td><td>禁止改动 .env、生产配置等敏感文件</td></tr>
<tr><td><b>PostToolUse</b></td><td>动作执行后</td><td>自动格式化、自动跑相关测试</td></tr>
<tr><td><b>Stop</b></td><td>AI 完成回合时</td><td>响铃通知你、记录日志</td></tr>
</table>
<div class="tip">💡 一个立刻能用的组合：PreToolUse 挡住敏感文件 + PostToolUse 自动格式化 + Stop 播放提示音。「规矩靠 Hook 强制，风格靠 CLAUDE.md 引导」。</div>

<h3>6.3 定时跑：cron + claude -p</h3>
<p>Linux/Mac 自带的 <span class="term">cron</span> 就是系统级 Schedule Trigger。<code class="inline">crontab -e</code> 加一行：</p>
<pre># 每天 08:00 检查项目并把报告写进文件
0 8 * * * cd ~/projects/foodme && claude -p "检查 git log 里昨天的所有提交，写一份中文变更日报" >> ~/reports/daily.md</pre>
<p>五个位置分别是：分 时 日 月 星期（和轨道 A 第 2 课的 Cron 是同一套语法——知识开始串起来了）。</p>

<h3>6.4 该给谁跑？n8n vs 定时 Claude Code</h3>
<table>
<tr><th>任务性质</th><th>交给</th><th>原因</th></tr>
<tr><td>固定路线的数据搬运（读表→发信）</td><td>n8n</td><td>可视化、稳定、便宜、好维护</td></tr>
<tr><td>需要「理解代码/文本再判断」的任务（审查提交、总结日志、检查文档一致性）</td><td>cron + claude -p</td><td>这类判断 n8n 画不出来，是 AI 的主场</td></tr>
<tr><td>两者混合</td><td>n8n 做骨架，其中一步用 Execute Command 调 claude -p</td><td>各取所长</td></tr>
</table>
`,
en:`
<h3>6.1 Headless mode: AI as a command</h3>
<p>So far we've "gone in to chat". Add <code class="inline">-p</code> (print) and Claude Code becomes a command that <b>runs the task, prints the result, and exits</b> — callable from scripts, pipeable, schedulable, just like ls or grep:</p>
<pre># One-shot task, take the answer and leave
claude -p "find all TODO comments under src and output a tidy list"

# Pipes: feed it another command's output
cat error.log | claude -p "analyze this error log and find the most likely root cause"

# Machine-readable output
claude -p "count lines of code by file type in this project" --output-format json</pre>
<p>This step matters enormously: the AI goes from "someone you chat with" to "a component you can orchestrate". Anywhere a command can run — scripts, cron, CI/CD, even n8n's Execute Command node — can now embed a piece of intelligence.</p>

<h3>6.2 Hooks: automatic intervention at key moments</h3>
<p>A <span class="term">hook</span> means "when the AI performs a certain kind of action, automatically run my command". Versus CLAUDE.md: CLAUDE.md is a <b>request</b> (AI tries to comply); a hook is <b>enforcement</b> (always fires). Configured in <code class="inline">.claude/settings.json</code>:</p>
<pre>{
  "hooks": {
    "PostToolUse": [{
      "matcher": "Edit|Write",
      "hooks": [{ "type": "command",
                  "command": "npx prettier --write \"$CLAUDE_FILE_PATHS\"" }]
    }]
  }
}</pre>
<p>Meaning: <b>every time</b> the AI edits/writes a file (PostToolUse + Edit|Write), prettier auto-formats it. Common hook moments:</p>
<table>
<tr><th>Moment</th><th>Fires</th><th>Typical use</th></tr>
<tr><td><b>PreToolUse</b></td><td>Before an action (can block)</td><td>Forbid touching .env, production configs, other sensitive files</td></tr>
<tr><td><b>PostToolUse</b></td><td>After an action</td><td>Auto-format, auto-run related tests</td></tr>
<tr><td><b>Stop</b></td><td>When the AI finishes a turn</td><td>Ping a sound, write logs</td></tr>
</table>
<div class="tip">💡 An instantly useful combo: PreToolUse guarding sensitive files + PostToolUse auto-format + Stop chime. "Enforce rules with hooks; guide style with CLAUDE.md."</div>

<h3>6.3 Scheduled runs: cron + claude -p</h3>
<p><span class="term">cron</span>, built into Linux/Mac, is the OS-level Schedule Trigger. <code class="inline">crontab -e</code> and add:</p>
<pre># Every day 08:00: review the project and append a report
0 8 * * * cd ~/projects/foodme && claude -p "review yesterday's commits in git log and write a change digest" >> ~/reports/daily.md</pre>
<p>The five fields: minute hour day month weekday — the same Cron syntax as Track A Lesson 2. The knowledge is linking up.</p>

<h3>6.4 Who runs what? n8n vs scheduled Claude Code</h3>
<table>
<tr><th>Task nature</th><th>Give to</th><th>Why</th></tr>
<tr><td>Fixed-route data moving (read sheet → send mail)</td><td>n8n</td><td>Visual, stable, cheap, maintainable</td></tr>
<tr><td>Tasks needing understanding of code/text before judging (review commits, summarize logs, check doc consistency)</td><td>cron + claude -p</td><td>n8n can't draw that judgment; it's AI's home turf</td></tr>
<tr><td>Mixed</td><td>n8n skeleton with one Execute Command step calling claude -p</td><td>Best of both</td></tr>
</table>
`},
lab:{zh:`<h3>🧪 实验：三连击</h3>
<ol>
<li><b>无头模式</b>：在项目里跑 <code class="inline">claude -p "用 3 句话总结这个项目"</code>，再试管道 <code class="inline">git log --oneline -20 | claude -p "总结这些提交做了什么"</code></li>

</ol>`},
